<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="106%"><feDropShadow dx="1" dy="1.5" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4CAF50"/></marker>
  </defs>
  <rect width="800" height="750" fill="white" rx="8"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Fluxo de Trabalho Clínico AVBC: Do Mapa ao Anel</text>

  <!-- Step 1: Exame Padrão -->
  <rect x="220" y="50" width="360" height="40" rx="8" fill="#546E7A" filter="url(#ds)"/>
  <text x="400" y="75" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1. Exame Oftalmológico Padrão</text>
  <text x="620" y="73" font-size="8" fill="#90A4AE">AVMC · Refração · PIO · Biomicroscopia</text>
  <line x1="400" y1="90" x2="400" y2="108" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 2: Tomografia -->
  <rect x="220" y="112" width="360" height="40" rx="8" fill="#37474F" filter="url(#ds)"/>
  <text x="400" y="137" text-anchor="middle" font-size="11" font-weight="bold" fill="white">2. Tomografia Corneana (Pentacam)</text>
  <text x="620" y="135" font-size="8" fill="#90A4AE">K-steep · KMax · Paquimetria · ENM</text>
  <line x1="400" y1="152" x2="400" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 3: Aberrometria -->
  <rect x="220" y="174" width="360" height="40" rx="8" fill="#37474F" filter="url(#ds)"/>
  <text x="400" y="199" text-anchor="middle" font-size="11" font-weight="bold" fill="white">3. Aberrometria de Frente de Onda</text>
  <text x="620" y="197" font-size="8" fill="#90A4AE">ICE · Coma · HOA · Δ Eixo</text>
  <line x1="400" y1="214" x2="400" y2="232" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ═══ Module O ═══ -->
  <rect x="170" y="236" width="460" height="55" rx="10" fill="#E3F2FD" stroke="#0288D1" stroke-width="2" filter="url(#ds)"/>
  <text x="400" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#0277BD">MÓDULO O: Coerência Óptica</text>
  <rect x="210" y="268" width="60" height="18" rx="4" fill="#4CAF50"/>
  <text x="240" y="281" text-anchor="middle" font-size="9" font-weight="bold" fill="white">O+</text>
  <rect x="290" y="268" width="60" height="18" rx="4" fill="#FFC107"/>
  <text x="320" y="281" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">O~</text>
  <rect x="370" y="268" width="60" height="18" rx="4" fill="#EF5350"/>
  <text x="400" y="281" text-anchor="middle" font-size="9" font-weight="bold" fill="white">O−</text>
  <!-- O- branch -->
  <text x="460" y="281" font-size="8" fill="#C62828">→ Ajustar expectativas</text>
  <line x1="400" y1="291" x2="400" y2="309" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ═══ Module T ═══ -->
  <rect x="170" y="313" width="460" height="55" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" filter="url(#ds)"/>
  <text x="400" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">MÓDULO T: Morfologia + ENM</text>
  <text x="400" y="358" text-anchor="middle" font-size="9" fill="#333">Oval | Mamilo | Crescente | Formato D | Globo → Calcular |ENM − K-steep|</text>
  <line x1="400" y1="368" x2="400" y2="386" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ═══ Module B ═══ -->
  <rect x="170" y="390" width="460" height="60" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="2" filter="url(#ds)"/>
  <text x="400" y="414" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">MÓDULO B: Seleção do Vetor Dominante</text>

  <rect x="200" y="422" width="100" height="22" rx="4" fill="#2171B5"/>
  <text x="250" y="437" text-anchor="middle" font-size="9" font-weight="bold" fill="white">VR → Espessura</text>
  <rect x="320" y="422" width="100" height="22" rx="4" fill="#31A354"/>
  <text x="370" y="437" text-anchor="middle" font-size="9" font-weight="bold" fill="white">VT → Arco</text>
  <rect x="440" y="422" width="100" height="22" rx="4" fill="#E6550D"/>
  <text x="490" y="437" text-anchor="middle" font-size="9" font-weight="bold" fill="white">Vτ → Δt</text>
  <line x1="400" y1="450" x2="400" y2="468" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Safety check -->
  <rect x="220" y="472" width="360" height="35" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5" filter="url(#ds)"/>
  <text x="400" y="494" text-anchor="middle" font-size="10" font-weight="bold" fill="#C62828">⚠ Verificar RT_max ≤ CT × 0,60</text>
  <line x1="400" y1="507" x2="400" y2="525" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Prescription -->
  <rect x="195" y="529" width="410" height="40" rx="8" fill="#263238" filter="url(#ds)"/>
  <text x="400" y="554" text-anchor="middle" font-size="12" font-weight="bold" fill="white">PRESCRIÇÃO: Espessura · Arco · Prof. · Meridiano · Perfil</text>
  <line x1="400" y1="569" x2="400" y2="587" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Surgery -->
  <rect x="280" y="591" width="240" height="35" rx="8" fill="#00695C" filter="url(#ds)"/>
  <text x="400" y="613" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🔬 CIRURGIA (Implantação ICRS)</text>
  <line x1="400" y1="626" x2="400" y2="644" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Follow-up -->
  <rect x="220" y="648" width="360" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" filter="url(#ds)"/>
  <text x="400" y="665" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">Follow-up 3–6 Meses</text>
  <text x="400" y="681" text-anchor="middle" font-size="9" fill="#333">CI_R = ΔK_real / ΔK_previsto → Calibração Pessoal</text>

  <!-- Feedback loop arrow -->
  <path d="M 580 670 Q 700 670 700 420 Q 700 300 630 290" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ag)"/>
  <text x="715" y="450" font-size="8" fill="#4CAF50" font-weight="bold" transform="rotate(90, 715, 450)">Feedback → Calibração</text>

  <!-- Footer -->
  <text x="400" y="740" text-anchor="middle" font-size="8" fill="#CCC">Figura 10.1 — Fluxo Clínico Completo AVBC · Dr. Miguel Reis · Dra. Jordana Sandes</text>
</svg>
