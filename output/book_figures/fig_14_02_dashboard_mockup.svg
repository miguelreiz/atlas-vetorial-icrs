<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="106%"><feDropShadow dx="1" dy="1.5" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="780" height="420" fill="#1A1A2E" rx="8"/>
  <text x="390" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#E0E0E0">Dashboard Clínico AVBC — Conceito de Interface</text>

  <!-- ═══ Top-Left: Topographic Map (Module T) ═══ -->
  <rect x="15" y="40" width="370" height="170" rx="8" fill="#16213E" stroke="#334756" stroke-width="1" filter="url(#ds)"/>
  <text x="200" y="60" text-anchor="middle" font-size="10" font-weight="bold" fill="#4FC3F7">MÓDULO T — Mapa Topográfico + ENM</text>
  <!-- Simulated topo map -->
  <circle cx="200" cy="130" r="60" fill="#0D47A1" opacity="0.3"/>
  <ellipse cx="185" cy="145" rx="25" ry="20" fill="#FF6F00" opacity="0.4"/>
  <ellipse cx="185" cy="145" rx="12" ry="10" fill="#FF3D00" opacity="0.5"/>
  <text x="185" y="148" text-anchor="middle" font-size="6" fill="white">Cone</text>
  <!-- ENM line -->
  <line x1="155" y1="170" x2="245" y2="90" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="250" y="88" font-size="7" fill="#4CAF50" font-weight="bold">ENM 135°</text>
  <!-- K-steep line -->
  <line x1="165" y1="165" x2="235" y2="95" stroke="#FF5722" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="240" y="100" font-size="7" fill="#FF5722">K-steep 100°</text>
  <!-- Info -->
  <text x="320" y="100" font-size="8" fill="#90A4AE">Morfologia: Crescente</text>
  <text x="320" y="115" font-size="8" fill="#90A4AE">KMax: 54,3 D</text>
  <text x="320" y="130" font-size="8" fill="#FFC107" font-weight="bold">|ENM−K|= 35°</text>
  <text x="320" y="150" font-size="8" fill="#EF5350" font-weight="bold">⚠ Divergência Alta</text>
  <text x="320" y="170" font-size="8" fill="#90A4AE">→ Usar ENM</text>

  <!-- ═══ Top-Right: Wavefront (Module O) ═══ -->
  <rect x="395" y="40" width="370" height="170" rx="8" fill="#16213E" stroke="#334756" stroke-width="1" filter="url(#ds)"/>
  <text x="580" y="60" text-anchor="middle" font-size="10" font-weight="bold" fill="#4FC3F7">MÓDULO O — Frente de Onda</text>
  <!-- Classification badge -->
  <rect x="415" y="75" width="60" height="25" rx="5" fill="#FFC107"/>
  <text x="445" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">O~</text>
  <!-- Metrics -->
  <text x="490" y="92" font-size="8" fill="#90A4AE">Intermediário</text>
  <text x="415" y="120" font-size="8" fill="#90A4AE">ICE_min: 28° (Moderado)</text>
  <text x="415" y="135" font-size="8" fill="#90A4AE">RMS Coma: 2,8 μm</text>
  <text x="415" y="150" font-size="8" fill="#90A4AE">HOA Total: 3,2 μm</text>
  <text x="415" y="165" font-size="8" fill="#FFC107">Δ Eixo: 22° (Intermediário)</text>
  <!-- Bar chart mini -->
  <rect x="630" y="80" width="15" height="60" rx="2" fill="#2171B5" opacity="0.5"/>
  <rect x="630" y="110" width="15" height="30" rx="2" fill="#2171B5"/>
  <rect x="655" y="85" width="15" height="55" rx="2" fill="#FFC107" opacity="0.5"/>
  <rect x="655" y="108" width="15" height="32" rx="2" fill="#FFC107"/>
  <rect x="680" y="90" width="15" height="50" rx="2" fill="#EF5350" opacity="0.5"/>
  <rect x="680" y="118" width="15" height="22" rx="2" fill="#EF5350"/>
  <text x="637" y="155" text-anchor="middle" font-size="5" fill="#90A4AE">Coma</text>
  <text x="662" y="155" text-anchor="middle" font-size="5" fill="#90A4AE">HOA</text>
  <text x="687" y="155" text-anchor="middle" font-size="5" fill="#90A4AE">Δ Eixo</text>

  <!-- ═══ Bottom-Left: Vector Selection (Module B) ═══ -->
  <rect x="15" y="220" width="370" height="170" rx="8" fill="#16213E" stroke="#334756" stroke-width="1" filter="url(#ds)"/>
  <text x="200" y="240" text-anchor="middle" font-size="10" font-weight="bold" fill="#4FC3F7">MÓDULO B — Seleção Vetorial</text>
  <!-- Vector bars -->
  <text x="35" y="268" font-size="9" fill="#2171B5" font-weight="bold">VR</text>
  <rect x="60" y="256" width="120" height="16" rx="3" fill="#2171B5" opacity="0.6"/>
  <text x="190" y="268" font-size="8" fill="#90A4AE">19,2 μm (secundário)</text>

  <text x="35" y="298" font-size="9" fill="#4CAF50" font-weight="bold">VT</text>
  <rect x="60" y="286" width="250" height="16" rx="3" fill="#4CAF50"/>
  <text x="320" y="298" font-size="8" fill="#66BB6A" font-weight="bold">7,33 kPa ★ DOMINANTE</text>

  <text x="35" y="328" font-size="9" fill="#E6550D" font-weight="bold">Vτ</text>
  <rect x="60" y="316" width="80" height="16" rx="3" fill="#E6550D" opacity="0.4"/>
  <text x="150" y="328" font-size="8" fill="#90A4AE">2,1 μN·m (terciário)</text>

  <!-- Sliders hint -->
  <text x="35" y="360" font-size="7" fill="#546E7A">⟵ Arraste os sliders para simular diferentes configurações ⟶</text>
  <rect x="60" y="365" width="280" height="4" rx="2" fill="#334756"/>
  <circle cx="200" cy="367" r="6" fill="#4FC3F7"/>

  <!-- ═══ Bottom-Right: Prescription Panel ═══ -->
  <rect x="395" y="220" width="370" height="170" rx="8" fill="#16213E" stroke="#334756" stroke-width="1" filter="url(#ds)"/>
  <text x="580" y="240" text-anchor="middle" font-size="10" font-weight="bold" fill="#4FC3F7">PRESCRIÇÃO RECOMENDADA</text>

  <text x="415" y="268" font-size="9" fill="#E0E0E0">Espessura:</text>
  <text x="510" y="268" font-size="9" fill="#4FC3F7" font-weight="bold">200 μm</text>
  <text x="415" y="288" font-size="9" fill="#E0E0E0">Arco:</text>
  <text x="510" y="288" font-size="9" fill="#66BB6A" font-weight="bold">255° (longo)</text>
  <text x="415" y="308" font-size="9" fill="#E0E0E0">Profundidade:</text>
  <text x="510" y="308" font-size="9" fill="#4FC3F7" font-weight="bold">70% (312 μm)</text>
  <text x="415" y="328" font-size="9" fill="#E0E0E0">Meridiano:</text>
  <text x="510" y="328" font-size="9" fill="#66BB6A" font-weight="bold">135° (ENM)</text>
  <text x="415" y="348" font-size="9" fill="#E0E0E0">Perfil:</text>
  <text x="510" y="348" font-size="9" fill="#4FC3F7" font-weight="bold">Simétrico</text>

  <!-- Nomogram comparison -->
  <rect x="620" y="260" width="130" height="50" rx="5" fill="#1A1A2E" stroke="#EF5350" stroke-width="1"/>
  <text x="685" y="278" text-anchor="middle" font-size="8" fill="#EF5350" font-weight="bold">≠ Nomograma</text>
  <text x="685" y="293" text-anchor="middle" font-size="7" fill="#FFCDD2">Eixo: 100° (−35°)</text>
  <text x="685" y="305" text-anchor="middle" font-size="7" fill="#FFCDD2">Arco: 160° (−95°)</text>

  <!-- RT check -->
  <rect x="620" y="320" width="130" height="30" rx="5" fill="#1B5E20"/>
  <text x="685" y="340" text-anchor="middle" font-size="8" fill="white" font-weight="bold">✓ RT_max OK</text>

  <!-- Footer -->
  <text x="390" y="410" text-anchor="middle" font-size="7" fill="#555">Figura 14.2 — Mockup Dashboard Clínico AVBC · Dr. Miguel Reis · Dra. Jordana Sandes</text>
</svg>
