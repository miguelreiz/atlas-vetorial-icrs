<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="106%"><feDropShadow dx="1" dy="1.5" stdDeviation="2" flood-opacity="0.12"/></filter>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#A5D6A7"/>
    </radialGradient>
  </defs>

  <rect width="780" height="420" fill="white" rx="8"/>
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Vetor VT: Mecanismo de Cintagem (Hoop Restriction)</text>
  <text x="390" y="46" text-anchor="middle" font-size="10" fill="#888">Contenção circunferencial para regularização do astigmatismo</text>

  <!-- ═══ FRONTAL VIEW — Cornea ═══ -->
  <!-- Cornea circle -->
  <circle cx="260" cy="230" r="145" fill="url(#cg)" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Limbus label -->
  <text x="260" y="95" text-anchor="middle" font-size="8" fill="#2E7D32">Limbo</text>

  <!-- Central zone -->
  <circle cx="260" cy="230" r="40" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="260" y="234" text-anchor="middle" font-size="8" fill="#888">Central</text>

  <!-- ICRS arc (the hoop restriction band) — long arc covering ~250° -->
  <path d="M 160 355 A 140 140 0 1 1 360 355" fill="none" stroke="#31A354" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <text x="260" y="385" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B5E20">Arco ICRS (≈320°)</text>

  <!-- Restricted zone markers (small X marks where expansion is blocked) -->
  <g fill="#2E7D32" font-size="10" font-weight="bold" opacity="0.6">
    <text x="120" y="195">×</text><text x="125" y="240">×</text><text x="135" y="285">×</text>
    <text x="155" y="320">×</text><text x="195" y="345">×</text>
    <text x="325" y="345">×</text><text x="365" y="320">×</text>
    <text x="385" y="285">×</text><text x="395" y="240">×</text><text x="390" y="195">×</text>
    <text x="370" y="155">×</text><text x="330" y="120">×</text><text x="260" y="100">×</text>
    <text x="190" y="120">×</text><text x="150" y="155">×</text>
  </g>

  <!-- Free zone (gap in the arc) with expansion arrows -->
  <line x1="165" y1="360" x2="145" y2="380" stroke="#CC3333" stroke-width="2"/>
  <line x1="355" y1="360" x2="375" y2="380" stroke="#CC3333" stroke-width="2"/>
  <text x="260" y="370" text-anchor="middle" font-size="7" fill="#CC3333">Zona livre</text>

  <!-- Radial expansion arrows (only in free zone) -->
  <line x1="220" y1="365" x2="210" y2="395" stroke="#CC3333" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="300" y1="365" x2="310" y2="395" stroke="#CC3333" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="260" y="410" text-anchor="middle" font-size="8" fill="#CC3333">Deformação residual concentrada</text>

  <!-- ═══ RIGHT PANEL: Explanation ═══ -->
  <!-- Rule box 1 -->
  <rect x="445" y="75" width="310" height="80" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" filter="url(#ds)"/>
  <text x="600" y="97" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Princípio da Cintagem</text>
  <text x="460" y="118" font-size="9" fill="#333">O ICRS rígido impede a distensão radial</text>
  <text x="460" y="133" font-size="9" fill="#333">ao longo do seu arco. Quanto mais longo</text>
  <text x="460" y="148" font-size="9" fill="#333">o arco → mais córnea "cinturada" → mais regular.</text>

  <!-- Rule box 2 -->
  <rect x="445" y="175" width="310" height="60" rx="8" fill="#FFF3E0" stroke="#E6550D" stroke-width="1.5" filter="url(#ds)"/>
  <text x="600" y="197" text-anchor="middle" font-size="11" font-weight="bold" fill="#BF360C">Achado Revolucionário</text>
  <text x="460" y="216" font-size="9" fill="#333">VT é independente da espessura!</text>
  <text x="460" y="230" font-size="9" fill="#555">150 μm e 300 μm com mesmo arco → mesmo VT.</text>

  <!-- Key equation box -->
  <rect x="445" y="255" width="310" height="55" rx="8" fill="#E3F2FD" stroke="#2171B5" stroke-width="1.5" filter="url(#ds)"/>
  <text x="600" y="277" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">Equação VT</text>
  <text x="600" y="300" text-anchor="middle" font-size="10" fill="#333">δ_ring = −0,104 × Arco° + 37,38</text>

  <!-- Clinical summary box -->
  <rect x="445" y="330" width="310" height="70" rx="8" fill="#263238" filter="url(#ds)"/>
  <text x="600" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Regra Clínica</text>
  <text x="600" y="373" text-anchor="middle" font-size="10" fill="#B2DFDB">Astigmatismo alto → Arco longo (210°–320°)</text>
  <text x="600" y="390" text-anchor="middle" font-size="10" fill="#B2DFDB">Astigmatismo baixo → Arco curto (90°–160°)</text>

  <!-- Footer -->
  <text x="390" y="418" text-anchor="middle" font-size="8" fill="#CCC">Figura 6.1 — Mecanismo de Cintagem Circunferencial · Dr. Miguel Reis · Dra. Jordana Sandes</text>
</svg>
