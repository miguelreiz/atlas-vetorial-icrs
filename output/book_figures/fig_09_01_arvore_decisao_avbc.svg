<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="106%"><feDropShadow dx="1" dy="1.5" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
  </defs>
  <rect width="800" height="800" fill="white" rx="8"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Árvore de Decisão Completa AVBC</text>

  <!-- ═══ START ═══ -->
  <rect x="280" y="48" width="240" height="35" rx="8" fill="#455A64" filter="url(#ds)"/>
  <text x="400" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Dados Pré-Operatórios</text>
  <line x1="400" y1="83" x2="400" y2="103" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ MODULE O ═══ -->
  <rect x="250" y="107" width="300" height="32" rx="8" fill="#0288D1" filter="url(#ds)"/>
  <text x="400" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Módulo O: Coerência Óptica</text>

  <!-- O branches -->
  <line x1="310" y1="139" x2="140" y2="165" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="400" y1="139" x2="400" y2="165" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="490" y1="139" x2="660" y2="165" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>

  <rect x="70" y="169" width="130" height="38" rx="6" fill="#4CAF50" filter="url(#ds)"/>
  <text x="135" y="185" text-anchor="middle" font-size="10" font-weight="bold" fill="white">O+ Favorável</text>
  <text x="135" y="200" text-anchor="middle" font-size="8" fill="#C8E6C9">Alta confiança</text>

  <rect x="335" y="169" width="130" height="38" rx="6" fill="#FFC107" filter="url(#ds)"/>
  <text x="400" y="185" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">O~ Intermediário</text>
  <text x="400" y="200" text-anchor="middle" font-size="8" fill="#795548">Cautela</text>

  <rect x="595" y="169" width="140" height="38" rx="6" fill="#EF5350" filter="url(#ds)"/>
  <text x="665" y="185" text-anchor="middle" font-size="10" font-weight="bold" fill="white">O− Desfavorável</text>
  <text x="665" y="200" text-anchor="middle" font-size="8" fill="#FFCDD2">Ajustar expectativas</text>

  <!-- Arrows from O+, O~ down to Module T -->
  <line x1="135" y1="207" x2="135" y2="245" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="400" y1="207" x2="400" y2="245" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- O- goes to a different path -->
  <line x1="665" y1="207" x2="665" y2="245" stroke="#CC3333" stroke-width="1.3" marker-end="url(#arr)" stroke-dasharray="4,2"/>

  <!-- O- special path -->
  <rect x="590" y="249" width="160" height="48" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="670" y="267" text-anchor="middle" font-size="9" font-weight="bold" fill="#C62828">Manejo Topográfico</text>
  <text x="670" y="282" text-anchor="middle" font-size="8" fill="#C62828">Facilitar LC ou</text>
  <text x="670" y="293" text-anchor="middle" font-size="8" fill="#C62828">Estabilização + CXL</text>

  <!-- ═══ MODULE T ═══ -->
  <rect x="100" y="249" width="460" height="32" rx="8" fill="#2E7D32" filter="url(#ds)"/>
  <text x="330" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Módulo T: Morfologia Topográfica + ENM</text>

  <!-- T: 5 archetypes -->
  <line x1="120" y1="281" x2="75" y2="308" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="220" y1="281" x2="200" y2="308" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="310" y1="281" x2="325" y2="308" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="400" y1="281" x2="445" y2="308" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="490" y1="281" x2="555" y2="308" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="20" y="312" width="100" height="45" rx="5" fill="white" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="70" y="330" text-anchor="middle" font-size="8" font-weight="bold" fill="#2E7D32">Oval Central</text>
  <text x="70" y="350" text-anchor="middle" font-size="7" fill="#777">ENM ≈ K-steep</text>

  <rect x="140" y="312" width="110" height="45" rx="5" fill="white" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="195" y="330" text-anchor="middle" font-size="8" font-weight="bold" fill="#2E7D32">Mamilo Inferior</text>
  <text x="195" y="350" text-anchor="middle" font-size="7" fill="#777">ENM ≈ 6h</text>

  <rect x="270" y="312" width="110" height="45" rx="5" fill="white" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="325" y="330" text-anchor="middle" font-size="8" font-weight="bold" fill="#2E7D32">Crescente</text>
  <text x="325" y="350" text-anchor="middle" font-size="7" fill="#777">ENM variável</text>

  <rect x="395" y="312" width="100" height="45" rx="5" fill="white" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="445" y="330" text-anchor="middle" font-size="8" font-weight="bold" fill="#2E7D32">Formato D</text>
  <text x="445" y="350" text-anchor="middle" font-size="7" fill="#777">Periférico >2mm</text>

  <rect x="510" y="312" width="95" height="45" rx="5" fill="#FFEBEE" stroke="#EF5350" stroke-width="1.5"/>
  <text x="557" y="330" text-anchor="middle" font-size="8" font-weight="bold" fill="#C62828">Globo</text>
  <text x="557" y="345" text-anchor="middle" font-size="7" fill="#C62828">>60 D</text>
  <text x="557" y="355" text-anchor="middle" font-size="6" fill="#C62828">→ Estabilização</text>

  <!-- ENM divergence check -->
  <rect x="140" y="375" width="280" height="25" rx="5" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="280" y="392" text-anchor="middle" font-size="9" fill="#2E7D32">|ENM − K-steep| > 15°? → Usar ENM como eixo de implante</text>

  <!-- Arrows from non-Globo archetypes down -->
  <line x1="280" y1="400" x2="280" y2="425" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ MODULE B ═══ -->
  <rect x="100" y="429" width="400" height="32" rx="8" fill="#E65100" filter="url(#ds)"/>
  <text x="300" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Módulo B: Seleção do Vetor Dominante</text>

  <!-- Decision questions -->
  <rect x="30" y="478" width="230" height="60" rx="6" fill="#E3F2FD" stroke="#2171B5" stroke-width="1.5" filter="url(#ds)"/>
  <text x="145" y="498" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565C0">Miopia/K alto + eixo alinhado?</text>
  <text x="145" y="515" text-anchor="middle" font-size="10" font-weight="bold" fill="#2171B5">→ VR Dominante</text>
  <text x="145" y="530" text-anchor="middle" font-size="8" fill="#555">↑ Espessura (250–400 μm)</text>

  <rect x="280" y="478" width="240" height="60" rx="6" fill="#E8F5E9" stroke="#31A354" stroke-width="1.5" filter="url(#ds)"/>
  <text x="400" y="498" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B5E20">Astigmatismo irregular alto?</text>
  <text x="400" y="515" text-anchor="middle" font-size="10" font-weight="bold" fill="#31A354">→ VT Dominante</text>
  <text x="400" y="530" text-anchor="middle" font-size="8" fill="#555">↑ Arco (210°–320°)</text>

  <rect x="540" y="478" width="230" height="60" rx="6" fill="#FFF3E0" stroke="#E6550D" stroke-width="1.5" filter="url(#ds)"/>
  <text x="655" y="498" text-anchor="middle" font-size="9" font-weight="bold" fill="#BF360C">Ápice deslocado + coma alto?</text>
  <text x="655" y="515" text-anchor="middle" font-size="10" font-weight="bold" fill="#E6550D">→ Vτ Dominante</text>
  <text x="655" y="530" text-anchor="middle" font-size="8" fill="#555">↑ Assimetria (300→150 μm)</text>

  <!-- All converge to prescription -->
  <line x1="145" y1="538" x2="145" y2="560" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="400" y1="538" x2="400" y2="560" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="655" y1="538" x2="655" y2="560" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Safety -->
  <rect x="100" y="564" width="600" height="30" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="400" y="584" text-anchor="middle" font-size="10" font-weight="bold" fill="#C62828">⚠ RT_max ≤ CT × 0,60 (Lei das Espessuras)</text>

  <line x1="400" y1="594" x2="400" y2="614" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ OUTPUT ═══ -->
  <rect x="170" y="618" width="460" height="42" rx="10" fill="#263238" filter="url(#ds)"/>
  <text x="400" y="637" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PRESCRIÇÃO DO ANEL</text>
  <text x="400" y="654" text-anchor="middle" font-size="9" fill="#B0BEC5">Espessura · Arco · Profundidade · Meridiano · Perfil (Simétrico / Progressivo)</text>

  <line x1="400" y1="660" x2="400" y2="680" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Post-op feedback -->
  <rect x="220" y="684" width="360" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="400" y="701" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">Feedback Pós-Operatório</text>
  <text x="400" y="717" text-anchor="middle" font-size="9" fill="#333">CI_R · VT-ratio · Vτ-ratio → Calibração Pessoal</text>

  <!-- Feedback arrow -->
  <path d="M 580 705 Q 740 705 740 450 Q 740 380 500 450" fill="none" stroke="#4CAF50" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)"/>

  <!-- Footer -->
  <text x="400" y="790" text-anchor="middle" font-size="8" fill="#CCC">Figura 9.1 — Árvore de Decisão Completa AVBC · Dr. Miguel Reis · Dra. Jordana Sandes</text>
</svg>
