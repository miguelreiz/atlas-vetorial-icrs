<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="106%"><feDropShadow dx="1" dy="1.5" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="atia" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2171B5"/></marker>
    <marker id="asia" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#31A354"/></marker>
    <marker id="adv" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#E6550D"/></marker>
  </defs>
  <rect width="780" height="400" fill="white" rx="8"/>
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Triângulo Vetorial de Alpins (Espaço de Ângulo Duplo)</text>
  <text x="390" y="46" text-anchor="middle" font-size="10" fill="#888">Astigmatismo Alvo vs Induzido vs Residual</text>

  <!-- ═══ Vector Triangle ═══ -->
  <!-- Origin point -->
  <circle cx="170" cy="280" r="5" fill="#333"/>
  <text x="155" y="300" font-size="9" fill="#333" font-weight="bold">Origem</text>

  <!-- TIA vector (Target Induced Astigmatism) — blue -->
  <line x1="170" y1="280" x2="520" y2="120" stroke="#2171B5" stroke-width="3.5" marker-end="url(#atia)"/>
  <text x="300" y="175" font-size="12" font-weight="bold" fill="#2171B5" transform="rotate(-25, 300, 175)">TIA</text>
  <text x="320" y="195" font-size="8" fill="#2171B5" transform="rotate(-25, 320, 195)">Astigmatismo Alvo Induzido</text>

  <!-- SIA vector (Surgically Induced Astigmatism) — green -->
  <line x1="170" y1="280" x2="440" y2="170" stroke="#31A354" stroke-width="3.5" marker-end="url(#asia)"/>
  <text x="260" y="235" font-size="12" font-weight="bold" fill="#31A354" transform="rotate(-22, 260, 235)">SIA</text>
  <text x="280" y="252" font-size="8" fill="#31A354" transform="rotate(-22, 280, 252)">Astigmatismo Cirurgicamente Induzido</text>

  <!-- DV vector (Difference Vector) — orange, from SIA tip to TIA tip -->
  <line x1="440" y1="170" x2="520" y2="120" stroke="#E6550D" stroke-width="3" stroke-dasharray="6,3" marker-end="url(#adv)"/>
  <text x="495" y="130" font-size="12" font-weight="bold" fill="#E6550D">DV</text>
  <text x="540" y="130" font-size="8" fill="#E6550D">Vetor Diferença</text>

  <!-- Angle TE (Torque of Error) arc -->
  <path d="M 220 256 A 60 60 0 0 0 210 250" fill="none" stroke="#777" stroke-width="1.2"/>
  <text x="230" y="248" font-size="8" fill="#777">TE</text>

  <!-- Target point label -->
  <circle cx="520" cy="120" r="4" fill="#2171B5"/>
  <text x="530" y="115" font-size="9" fill="#2171B5" font-weight="bold">Alvo</text>

  <!-- Achieved point label -->
  <circle cx="440" cy="170" r="4" fill="#31A354"/>
  <text x="450" y="165" font-size="9" fill="#31A354" font-weight="bold">Resultado</text>

  <!-- ═══ Index Legend ═══ -->
  <rect x="555" y="180" width="200" height="180" rx="8" fill="#FAFAFA" stroke="#DDD" stroke-width="1" filter="url(#ds)"/>
  <text x="655" y="203" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Índices de Alpins</text>
  <line x1="570" y1="210" x2="740" y2="210" stroke="#EEE" stroke-width="1"/>

  <text x="575" y="230" font-size="9" fill="#2171B5" font-weight="bold">CI</text>
  <text x="600" y="230" font-size="9" fill="#333">= SIA/TIA</text>
  <text x="600" y="243" font-size="7" fill="#777">Índice de Correção (ideal=1,0)</text>

  <text x="575" y="263" font-size="9" fill="#E6550D" font-weight="bold">IOS</text>
  <text x="605" y="263" font-size="9" fill="#333">= DV/TIA</text>
  <text x="605" y="276" font-size="7" fill="#777">Índice de Sucesso (ideal=0)</text>

  <text x="575" y="296" font-size="9" fill="#31A354" font-weight="bold">FI</text>
  <text x="600" y="296" font-size="9" fill="#333">= 1/CI</text>
  <text x="600" y="309" font-size="7" fill="#777">Índice de Aplanamento</text>

  <text x="575" y="329" font-size="9" fill="#777" font-weight="bold">TE</text>
  <text x="600" y="329" font-size="9" fill="#333">= ∠(TIA, SIA)</text>
  <text x="600" y="342" font-size="7" fill="#777">Erro Torquemétrico</text>

  <!-- Ideal annotation -->
  <rect x="60" y="85" width="170" height="55" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="145" y="103" text-anchor="middle" font-size="9" font-weight="bold" fill="#2E7D32">Resultado Ideal:</text>
  <text x="145" y="118" text-anchor="middle" font-size="8" fill="#333">SIA = TIA (CI = 1,0)</text>
  <text x="145" y="131" text-anchor="middle" font-size="8" fill="#333">DV = 0 (IOS = 0)</text>

  <!-- Footer -->
  <text x="390" y="390" text-anchor="middle" font-size="8" fill="#CCC">Figura 3.1 — Triângulo Vetorial de Alpins (Alpins, 1993) · Dr. Miguel Reis · Dra. Jordana Sandes</text>
</svg>
