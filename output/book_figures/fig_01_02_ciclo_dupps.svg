<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4CAF50"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#CC3333"/></marker>
  </defs>

  <rect width="800" height="600" fill="white" rx="8"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Ciclo de Descompensação de Dupps</text>
  <text x="400" y="48" text-anchor="middle" font-size="10" fill="#888">Feedback positivo na progressão do ceratocone</text>

  <!-- Central circle path -->
  <!-- Step 1: Degradação Enzimática -->
  <rect x="310" y="70" width="180" height="45" rx="8" fill="#7B1FA2" filter="url(#ds)"/>
  <text x="400" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="white">1. Degradação Enzimática</text>
  <text x="400" y="103" text-anchor="middle" font-size="8" fill="#E1BEE7">(MMP-2 / MMP-9)</text>

  <!-- Arrow 1→2 -->
  <line x1="490" y1="95" x2="560" y2="140" stroke="#555" stroke-width="1.8" marker-end="url(#a1)"/>

  <!-- Step 2: Aumento da Complacência -->
  <rect x="545" y="145" width="180" height="45" rx="8" fill="#C62828" filter="url(#ds)"/>
  <text x="635" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="white">2. ↑ Complacência Local</text>
  <text x="635" y="178" text-anchor="middle" font-size="8" fill="#FFCDD2">(↓ c, ↓ k₁ no HGO)</text>

  <!-- Arrow 2→3 -->
  <line x1="635" y1="190" x2="635" y2="240" stroke="#555" stroke-width="1.8" marker-end="url(#a1)"/>

  <!-- Step 3: Redistribuição de Tensão -->
  <rect x="545" y="245" width="180" height="55" rx="8" fill="#E65100" filter="url(#ds)"/>
  <text x="635" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="white">3. Redistribuição</text>
  <text x="635" y="278" text-anchor="middle" font-size="10" font-weight="bold" fill="white">de Tensão</text>
  <text x="635" y="291" text-anchor="middle" font-size="8" fill="#FFE0B2">(σ = PR/2t ↑)</text>

  <!-- Arrow 3→4 -->
  <line x1="635" y1="300" x2="635" y2="340" stroke="#555" stroke-width="1.8" marker-end="url(#a1)"/>

  <!-- Step 4: Mais Deformação -->
  <rect x="545" y="345" width="180" height="45" rx="8" fill="#EF6C00" filter="url(#ds)"/>
  <text x="635" y="365" text-anchor="middle" font-size="10" font-weight="bold" fill="white">4. ↑ Deformação</text>
  <text x="635" y="378" text-anchor="middle" font-size="8" fill="#FFE0B2">(↑ curvatura, ↓ espessura)</text>

  <!-- Arrow 4→5 -->
  <line x1="545" y1="370" x2="490" y2="410" stroke="#555" stroke-width="1.8" marker-end="url(#a1)"/>

  <!-- Step 5: Mais Atividade Enzimática -->
  <rect x="220" y="400" width="260" height="45" rx="8" fill="#AD1457" filter="url(#ds)"/>
  <text x="350" y="420" text-anchor="middle" font-size="10" font-weight="bold" fill="white">5. ↑ Atividade Enzimática</text>
  <text x="350" y="433" text-anchor="middle" font-size="8" fill="#F8BBD0">(Mecanotransdução → mais MMPs)</text>

  <!-- Arrow 5→1 (closing the loop) -->
  <path d="M 220 420 Q 100 420 100 250 Q 100 92 310 92" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#a1)"/>

  <!-- ═══ INTERVENTION: CXL ═══ -->
  <rect x="30" y="150" width="170" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" filter="url(#ds)"/>
  <text x="115" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">✂ CXL</text>
  <text x="115" y="184" text-anchor="middle" font-size="8" fill="#388E3C">Reforça fibras (↑ k₁)</text>
  <text x="115" y="196" text-anchor="middle" font-size="8" fill="#388E3C">Interrompe no passo 2→3</text>
  <!-- Arrow from CXL to step 2-3 junction -->
  <line x1="200" y1="175" x2="540" y2="175" stroke="#4CAF50" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#a2)"/>
  <!-- X mark on the cycle -->
  <text x="510" y="215" font-size="22" fill="#4CAF50" font-weight="bold">✕</text>

  <!-- ═══ INTERVENTION: ICRS ═══ -->
  <rect x="30" y="310" width="170" height="60" rx="8" fill="#E3F2FD" stroke="#2171B5" stroke-width="2" filter="url(#ds)"/>
  <text x="115" y="330" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">✂ ICRS</text>
  <text x="115" y="344" text-anchor="middle" font-size="8" fill="#1976D2">Redistribui tensão (VR/VT/Vτ)</text>
  <text x="115" y="356" text-anchor="middle" font-size="8" fill="#1976D2">Interrompe no passo 3→4</text>
  <!-- Arrow from ICRS to step 3-4 junction -->
  <line x1="200" y1="340" x2="540" y2="340" stroke="#2171B5" stroke-width="2.5" stroke-dasharray="6,3"/>
  <!-- X mark -->
  <text x="510" y="325" font-size="22" fill="#2171B5" font-weight="bold">✕</text>

  <!-- Center label -->
  <text x="380" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#D32F2F" opacity="0.3">CICLO</text>
  <text x="380" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#D32F2F" opacity="0.3">VICIOSO</text>

  <!-- Key insight box -->
  <rect x="120" y="480" width="560" height="50" rx="8" fill="#FFF8E1" stroke="#FFA000" stroke-width="1.5"/>
  <text x="400" y="500" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">⚠ A PIO normal (15 mmHg) é o motor mecânico — o problema não é a pressão, é a fraqueza do material.</text>
  <text x="400" y="517" text-anchor="middle" font-size="9" fill="#555">O CXL reforça o material (k₁ ↑). O ICRS redistribui a tensão (VR, VT, Vτ). Ambos interrompem o ciclo.</text>

  <!-- Footer -->
  <text x="400" y="560" text-anchor="middle" font-size="8" fill="#CCC">Figura 1.2 — Ciclo de Descompensação de Dupps (Dupps &amp; Roberts, 2001; 2014)</text>
  <text x="400" y="575" text-anchor="middle" font-size="7" fill="#DDD">Dr. Miguel Reis · Dra. Jordana Sandes</text>
</svg>
