as deslizam / radiais frouxas</text><line x1="670" y1="190" x2="830" y2="190" stroke="#ff7043" stroke-width="4"/><line x1="670" y1="220" x2="830" y2="220" stroke="#ff7043" stroke-width="4"/><line x1="690" y1="250" x2="850" y2="250" stroke="#ff7043" stroke-width="4"/><line x1="710" y1="280" x2="870" y2="280" stroke="#ff7043" stroke-width="4"/><line x1="670" y1="310" x2="830" y2="310" stroke="#ff7043" stroke-width="4"/><line x1="700" y1="250" x2="800" y2="250" stroke="#ff7043" stroke-width="3" stroke-dasharray="4,4"/><path d="M 680 270 L 650 270 L 660 260" fill="none" stroke="#ff7043" stroke-width="3"/><line x1="885" y1="250" x2="905" y2="250" stroke="#455a64" stroke-width="4"/><polygon points="905,250 895,245 895,255" fill="#455a64"/><rect x="910" y="80" width="260" height="300" rx="10" fill="#111B24" stroke="#ff1744" stroke-width="2"/><rect x="910" y="80" width="260" height="40" rx="10" fill="#ff1744" opacity="0.2"/><text x="1040" y="108" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">4. Ectasia</text><text x="1040" y="410" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">PIO vence focalmente / protrusão</text><path d="M 940 230 Q 1040 130 1140 230" fill="none" stroke="#ff1744" stroke-width="4"/><path d="M 940 250 Q 1040 150 1140 250" fill="none" stroke="#ff1744" stroke-width="4"/><path d="M 940 270 Q 1040 170 1140 270" fill="none" stroke="#ff1744" stroke-width="4"/><line x1="1000" y1="330" x2="1000" y2="270" stroke="#ffd600" stroke-width="4" marker-end="url(#arrowPio)"/><line x1="1040" y1="330" x2="1040" y2="270" stroke="#ffd600" stroke-width="4" marker-end="url(#arrowPio)"/><line x1="1080" y1="330" x2="1080" y2="270" stroke="#ffd600" stroke-width="4" marker-end="url(#arrowPio)"/><text x="1040" y="350" fill="#ffd600" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">PIO Focal</text>
