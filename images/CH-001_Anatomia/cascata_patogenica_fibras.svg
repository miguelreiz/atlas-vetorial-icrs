<text x="600" y="480" fill="#cfd8dc" font-family="Arial" font-size="14" font-style="italic" text-anchor="middle">Em todos os estágios, o anel límbico de fibras tangenciais permanece amplamente preservado, contendo a ectasia na região central/paracentral.</text></svg>