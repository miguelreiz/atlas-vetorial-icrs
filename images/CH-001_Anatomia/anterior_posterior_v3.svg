<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="700" fill="#0a1118"/>
<defs>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
</defs>
<text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 1.6: Por Que Anterior e Posterior Não Concordam nos Eixos</text><rect x="50" y="90" width="1100" height="40" fill="#111B24" rx="8"/><text x="600" y="115" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">Visão Superior: Uma "cama elástica" dupla. A pressão intraocular deforma ambas, mas a flexibilidade difere.</text><g transform="translate(600, 350) rotate(5)"><ellipse cx="0" cy="0" rx="180" ry="240" fill="#00e5ff" fill-opacity="0.2" stroke="#00e5ff" stroke-width="6" stroke-dasharray="15,5" filter="url(#glowCyan)"/><line x1="0" y1="-280" x2="0" y2="280" stroke="#00e5ff" stroke-width="4" filter="url(#glowCyan)"/></g><g transform="translate(600, 350) rotate(45)"><ellipse cx="0" cy="0" rx="160" ry="260" fill="#ff9100" fill-opacity="0.3" stroke="#ff9100" stroke-width="6" filter="url(#glowOrange)"/><line x1="0" y1="-300" x2="0" y2="300" stroke="#ff9100" stroke-width="4" filter="url(#glowOrange)"/></g><text x="700" y="90" fill="#00e5ff" font-family="Arial" font-size="22" font-weight="bold">Eixo Anterior (Ex: 95°)</text><text x="700" y="115" fill="#00e5ff" font-family="Arial" font-size="14">Superfície Rígida (Trama Densa)</text><text x="860" y="230" fill="#ff9100" font-family="Arial" font-size="22" font-weight="bold">Eixo Posterior (Ex: 135°)</text><text x="860" y="255" fill="#ff9100" font-family="Arial" font-size="14">Superfície Flexível (Lamelas Frouxas)</text><path d="M 779.3150456565143 365.68803369457845 A 180 180 0 0 1 727.2792206135786 477.27922061357856" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="4,4"/><text x="830" y="170" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold">Desalinhamento: 40°</text><rect x="50" y="600" width="1100" height="80" fill="#111B24" rx="8" stroke="#333"/><text x="600" y="630" fill="#ffeb3b" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Decodificando a Tomografia (Pentacam / Galilei)</text><text x="600" y="655" fill="#cfd8dc" font-family="Arial" font-size="15" text-anchor="middle">A superfície posterior cede e distorce mais livremente. A superfície anterior, travada pelas oblíquas, resiste e assume um eixo cruzado compensatório.</text></svg>