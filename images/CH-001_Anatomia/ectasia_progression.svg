<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="500" fill="#0a1118"/><text x="600" y="40" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Progressão Morfológica da Ectasia (Corte Transversal)</text><rect x="50" y="80" width="300" height="30" rx="5" fill="#00e676" opacity="0.2"/><text x="200" y="100" fill="#00e676" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">1. Córnea Normal</text><path d="M 50 250 Q 200 100 350 250 L 350 310 Q 200 160 50 310 Z" fill="#111B24" stroke="#00e676" stroke-width="3"/><path d="M 50 262 Q 200 112 350 262" fill="none" stroke="#2196f3" stroke-width="2" opacity="0.5"/><path d="M 50 274 Q 200 124 350 274" fill="none" stroke="#2196f3" stroke-width="2" opacity="0.5"/><path d="M 50 286 Q 200 136 350 286" fill="none" stroke="#2196f3" stroke-width="2" opacity="0.5"/><path d="M 50 298 Q 200 148 350 298" fill="none" stroke="#2196f3" stroke-width="2" opacity="0.5"/><rect x="450" y="80" width="300" height="30" rx="5" fill="#ffb300" opacity="0.2"/><text x="600" y="100" fill="#ffb300" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">2. Ectasia Leve/Moderada</text><path d="M 450 250 Q 600 90 750 250 L 750 295 Q 600 135 450 295 Z" fill="#111B24" stroke="#ffb300" stroke-width="3"/><path d="M 450 259 Q 600 99 750 259" fill="none" stroke="#2196f3" stroke-width="2" opacity="0.5"/><path d="M 450 268 Q 600 108 750 268" fill="none" stroke="#2196f3" stroke-width="2" opacity="0.5"/><path d="M 450 277 Q 600 117 750 277" fill="none" stroke="#2196f3" stroke-width="2" opacity="0.5"/><path d="M 450 286 Q 600 126 750 286" fill="none" stroke="#2196f3" stroke-width="2" opacity="0.5"/><path d="M 560 355 L 590 315" fill="none" stroke="#ff1744" stroke-width="3"/><path d="M 640 355 L 610 315" fill="none" stroke="#ff1744" stroke-width="3"/><text x="600" y="375" fill="#ff1744" font-family="Arial" font-size="14" font-weight="bold" text-anchor=