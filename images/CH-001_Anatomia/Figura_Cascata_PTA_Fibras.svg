<text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle" paint-order="stroke" stroke="#0a1118" stroke-width="4">Figura 1.14: O Mecanismo Biomecânico do Limiar PTA (40%)</text><rect x="50" y="90" width="500" height="40" rx="8" fill="#00e676" opacity="0.2"/><text x="300" y="118" fill="#00e676" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" paint-order="stroke" stroke="#0a1118" stroke-width="4">LASIK SEGURO (PTA < 40%)</text><rect x="100" y="180" width="400" height="300" fill="#111B24" rx="5" stroke="#333" stroke-width="2"/><line x1="100" y1="320" x2="500" y2="320" stroke="#ff5252" stroke-width="4" opacity="0.8"/><line x1="100" y1="345" x2="500" y2="345" stroke="#ff5252" stroke-width="4" opacity="0.8"/><line x1="100" y1="370" x2="500" y2="370" stroke="#ff5252" stroke-width="4" opacity="0.8"/><line x1="100" y1="395" x2="500" y2="395" stroke="#ff5252" stroke-width="4" opacity="0.8"/><line x1="100" y1="420" x2="500" y2="420" stroke="#ff5252" stroke-width="4" opacity="0.8"/><line x1="100" y1="445" x2="500" y2="445" stroke="#ff5252" stroke-width="4" opacity="0.8"/><line x1="100" y1="470" x2="500" y2="470" stroke="#ff5252" stroke-width="4" opacity="0.8"/><line x1="80" y1="260" x2="520" y2="260" stroke="#00e676" stroke-width="4" stroke-dasharray="8,4"/><text x="530" y="265" fill="#00e676" font-family="Arial" font-size="16" font-weight="bold">Base do Flap + Ablação</text><path d="M 100 270 L 100 268.53500077537444 L 140 269.56208521064184 L 180 269.39884766078995 L 220 261.61666652749113 L 260 269.58493253509073 L 300 279.87771645602777 L 340 275.0475913691875 L 380 276.78020455168723 L 420 264.4108466632247 L 460 278.802461904405 L 500 265.64679742418195" fill="none" stroke="#00e5ff" stroke-width="3" filter="url(#glowSafe)"/><path d="M 100 285 L 100 275.11696273066633 L 140 281.0045099806892 L 180 285.30713273483684 L 220 285.9789592371909 L 260 278.10774364213114 L 300 287.2290163467166 L 340 293.42032984396144 L 380 282.9550172631772 L 420 286.79753803731154 L 460 289.59949083680067 L 500 288.19231395614077" fill="none" stroke="#00e5ff" stroke-width="3" filter="url(#glowSafe)"/><path d="M 100 300 L 100 292.3524523910423 L 140 302.41278447336214 L 180 304.75068148407365 L 220 294.6494414813931 L 260 290.895632619315 L 300 307.7432199186806 L 340 295.35663050580695 L 380 293.3134735924847 L 420 308.6557710188936 L 460 297.50253830725785 L 500 301.29263429235283" fill="none" stroke="#00e5ff" stroke-width="3" filter="url(#glowSafe)"/><line x1="140" y1="270" x2="150" y2="360" stroke="#00e5ff" stroke-width="3"/><line x1="200" y1="270" x2="210" y2="360" stroke="#00e5ff" stroke-width="3"/><line x1="260" y1="270" x2="270" y2="360" stroke="#00e5ff" stroke-width="3"/><line x1="320" y1="270" x2="330" y2="360" stroke="#00e5ff" stroke-width="3"/><line x1="380" y1="270" x2="390" y2="360" stroke="#00e5ff" stroke-width="3"/><line x1="440" y1="270" x2="450" y2="360" stroke="#00e5ff" stroke-width="3"/><text x="300" y="520" fill="#00e676" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Rede de Travamento Preservada</text><text x="300" y="550" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">O limite de ablação não ultrapassou o</text><text x="300" y="570" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">1/3 anterior da córnea. Resta uma camada</text><text x="300" y="590" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">suficiente de fibras oblíquas cruzadas</text><text x="300" y="610" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">para amarrar as lamelas profundas.</text><rect x="650" y="90" width="500" height="40" rx="8" fill="#ff1744" opacity="0.2"/><text x="900" y="118" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" paint-order="stroke" stroke="#0a1118" stroke-width="4">LASIK DE RISCO (PTA > 40%)</text><rect x="700" y="180" width="400" height="300" fill="#111B24" rx="5" stroke="#333" stroke-width="2"/><path d="M 700 320 Q 900 328 1100 320" fill="none" stroke="#ff5252" stroke-width="4" opacity="0.8"/><path d="M 700 345 Q 900 363 1100 345" fill="none" stroke="#ff5252" stroke-width="4" opacity="0.8"/><path d="M 700 370 Q 900 398 1100 370" fill="none" stroke="#ff5252" stroke-width="4" opacity="0.8"/><path d="M 700 395 Q 900 433 1100 395" fill="none" stroke="#ff5252" stroke-width="4" opacity="0.8"/><path d="M 700 420 Q 900 468 1100 420" fill="none" stroke="#ff5252" stroke-width="4" opacity="0.8"/><path d="M 700 445 Q 900 503 1100 445" fill="none" stroke="#ff5252" stroke-width="4" opacity="0.8"/><path d="M 700 470 Q 900 538 1100 470" fill="none" stroke="#ff5252" stroke-width="4" opacity="0.8"/><line x1="680" y1="340" x2="1120" y2="340" stroke="#ff1744" stroke-width="4" stroke-dasharray="8,4"/><text x="1130" y="345" fill="#ff1744" font-family="Arial" font-size="16" font-weight="bold">Base do Flap + Ablação</text><line x1="740" y1="340" x2="750" y2="370" stroke="#ff1744" stroke-width="3"/><circle cx="750" cy="370" r="4" fill="#ff1744"/><line x1="800" y1="340" x2="810" y2="370" stroke="#ff1744" stroke-width="3"/><circle cx="810" cy="370" r="4" fill="#ff1744"/><line x1="860" y1="340" x2="870" y2="370" stroke="#ff1744" stroke-width="3"/><circle cx="870" cy="370" r="4" fill="#ff1744"/><line x1="920" y1="340" x2="930" y2="370" stroke="#ff1744" stroke-width="3"/><circle cx="930" cy="370" r="4" fill="#ff1744"/><line x1="980" y1="340" x2="990" y2="370" stroke="#ff1744" stroke-width="3"/><circle cx="990" cy="370" r="4" fill="#ff1744"/><line x1="1040" y1="340" x2="1050" y2="370" stroke="#ff1744" stroke-width="3"/><circle cx="1050" cy="370" r="4" fill="#ff1744"/><text x="900" y="520" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Travamento Totalmente Seccionado</text><text x="900" y="550" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">O corte foi profundo o suficiente para eliminar</text><text x="900" y="570" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">TODA a zona de pontes oblíquas anteriores.</text><text x="900" y="590" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">As lamelas posteriores não têm mais ancoragem</text><text x="900" y="610" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">vertical e começam a deslizar e protruir sob a PIO.</text><rect x="100" y="650" width="1000" height="60" fill="#111B24" rx="8" stroke="#333"/><text x="600" y="685" fill="#ffeb3b" font-family="Arial" font-size="18" text-anchor="middle" paint-order="stroke" stroke="#0a1118" stroke-width="4">O número mágico do PTA 40% não é arbitrário: ele representa a profundidade física exata onde a rede interlamelar termina.</text></svg>