<svg viewBox="0 0 1100 600" xmlns="http://www.w3.org/2000/svg"><rect width="1100" height="600" fill="#0a1118"/><text x="550" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 1.14: Por que o PTA 40% causa Ectasia</text><rect x="100" y="90" width="400" height="40" rx="8" fill="#00e676" opacity="0.2"/><text x="300" y="118" fill="#00e676" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">PTA Seguro (< 40%)</text><rect x="150" y="200" width="300" height="250" fill="#111B24" rx="5" stroke="#333" stroke-width="2"/><rect x="150" y="200" width="300" height="100" fill="#00e5ff" opacity="0.15"/><text x="240" y="255" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Estroma Anterior</text><text x="240" y="275" fill="#00e5ff" font-family="Arial" font-size="14" text-anchor="middle">(40% da espessura)</text><rect x="150" y="300" width="300" height="150" fill="#ff5252" opacity="0.1"/><text x="240" y="370" fill="#ff5252" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Estroma Posterior</text><text x="240" y="390" fill="#ff5252" font-family="Arial" font-size="14" text-anchor="middle">(60% da espessura)</text><path d="M 320 200 L 450 200 L 450 265 L 320 265 Z" fill="#ffeb3b" opacity="0.8" stroke="#f57f17" stroke-width="2"/><text x="385" y="237.5" fill="#0a1118" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Flap + Laser</text><line x1="130" y1="300" x2="470" y2="300" stroke="#ffffff" stroke-width="3" stroke-dasharray="10,5"/><text x="480" y="305" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">Limite de 40%</text><text x="300" y="500" fill="#00e676" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Restou Estroma Anterior!</text><text x="300" y="530" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">A córnea mantém amarras fortes,</text><text x="300" y="550" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">impedindo que o fundo deforme.</text><rect x="600" y="90" width="400" height="40" rx="8" fill="#ff1744" opacity="0.2"/><text x="800" y="118" fill="#ff1744" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">PTA de Risco (> 40%)</text><rect x="650" y="200" width="300" height="250" fill="#111B24" rx="5" stroke="#333" stroke-width="2"/><rect x="650" y="200" width="300" height="100" fill="#00e5ff" opacity="0.15"/><text x="740" y="255" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Estroma Anterior</text><text x="740" y="275" fill="#00e5ff" font-family="Arial" font-size="14" text-anchor="middle">(40% da espessura)</text><rect x="650" y="300" width="300" height="150" fill="#ff5252" opacity="0.1"/><text x="740" y="370" fill="#ff5252" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Estroma Posterior</text><text x="740" y="390" fill="#ff5252" font-family="Arial" font-size="14" text-anchor="middle">(60% da espessura)</text><path d="M 820 200 L 950 200 L 950 330 L 820 330 Z" fill="#ffeb3b" opacity="0.8" stroke="#f57f17" stroke-width="2"/><text x="885" y="270" fill="#0a1118" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Flap + Laser</text><line x1="630" y1="300" x2="970" y2="300" stroke="#ffffff" stroke-width="3" stroke-dasharray="10,5"/><text x="980" y="305" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">Limite de 40%</text><text x="800" y="500" fill="#ff1744" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Corte Profundo (Destrutivo)</text><text x="800" y="530" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">Toda a camada rígida frontal foi seccionada.</text><text x="800" y="550" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">O fundo solto vai entortar (Ectasia).</text></svg>