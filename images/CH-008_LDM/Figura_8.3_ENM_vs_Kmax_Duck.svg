<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="600" fill="#0A0E17"/><text x="400" y="50" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Figura 8.3: Cuidado Clássico: ENM e K-max não são a mesma coisa.</text><ellipse cx="400" cy="320" rx="20" ry="30" fill="none" stroke="#b0bec5" stroke-width="2" transform="rotate(0 400 320)"/><ellipse cx="400" cy="320" rx="35" ry="52.5" fill="none" stroke="#b0bec5" stroke-width="2" transform="rotate(5 400 320)"/><ellipse cx="400" cy="320" rx="50" ry="75" fill="none" stroke="#b0bec5" stroke-width="2" transform="rotate(10 400 320)"/><ellipse cx="400" cy="320" rx="65" ry="97.5" fill="none" stroke="#b0bec5" stroke-width="2" transform="rotate(15 400 320)"/><ellipse cx="400" cy="320" rx="80" ry="120" fill="none" stroke="#b0bec5" stroke-width="2" transform="rotate(20 400 320)"/><ellipse cx="400" cy="320" rx="95" ry="142.5" fill="none" stroke="#b0bec5" stroke-width="2" transform="rotate(25 400 320)"/><ellipse cx="400" cy="320" rx="110" ry="165" fill="none" stroke="#b0bec5" stroke-width="2" transform="rotate(30 400 320)"/><ellipse cx="400" cy="320" rx="125" ry="187.5" fill="none" stroke="#b0bec5" stroke-width="2" transform="rotate(35 400 320)"/><ellipse cx="400" cy="320" rx="140" ry="210" fill="none" stroke="#b0bec5" stroke-width="2" transform="rotate(40 400 320)"/><ellipse cx="400" cy="320" rx="155" ry="232.5" fill="none" stroke="#b0bec5" stroke-width="2" transform="rotate(45 400 320)"/><ellipse cx="340" cy="410" rx="30" ry="20" fill="#ff1744"/><text x="270" y="415" fill="#ff1744" font-family="Arial" font-size="16" font-weight="bold">K-max</text><line x1="550" y1="95" x2="250" y2="545" stroke="#ff1744" stroke-width="2" stroke-dasharray="5,5"/><line x1="600" y1="270" x2="200" y2="370" stroke="#ffffff" stroke-width="4"/><text x="150" y="360" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold">Eixo ENM</text><rect x="50" y="520" width="700" height="60" rx="10" fill="#111B24"/><text x="400" y="545" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Implantar no K-max (como ditam nomogramas clássicos) significa atuar dezenas de graus fora da torção real,</text><text x="400" y="565" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Aumentando o coma e borrando a visão. O anel ideal atua sobre a Reta Branca.</text></svg>