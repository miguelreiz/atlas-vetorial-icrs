<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg"><rect width="1000" height="600" fill="#0A0E17"/><text x="500" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 8.4: A Equação de Compensação</text><text x="500" y="80" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">V_anel (verde) DEVE neutralizar diretamente o V_cone (vermelho).</text><circle cx="250" cy="300" r="150" fill="none" stroke="#263238" stroke-width="4"/><circle cx="750" cy="300" r="150" fill="none" stroke="#263238" stroke-width="4"/><line x1="250" y1="300" x2="100" y2="300" stroke="#ff1744" stroke-width="12" marker-end="url(#arrowR)" filter="url(#glowF)"/><text x="100" y="280" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold">V_cone (Problema)</text><line x1="750" y1="300" x2="600" y2="300" stroke="#ff1744" stroke-width="6" opacity="0.3"/><line x1="750" y1="300" x2="900" y2="300" stroke="#00e676" stroke-width="12" marker-end="url(#arrowG)" filter="url(#glowF)"/><text x="770" y="280" fill="#00e676" font-family="Arial" font-size="20" font-weight="bold">V_anel (Solução ICRS)</text><rect x="250" y="500" width="500" height="70" rx="15" fill="#111B24" stroke="#ffffff" stroke-width="2"/><text x="500" y="540" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">| V_anel | = | - V_cone |  = Zero Distorção</text></svg>