<text x="750" y="60" fill="#ffffff" font-family="Arial" font-size="34" font-weight="bold" text-anchor="middle">Figura 6.1: A Analogia do Torque e a Força Direcional</text><text x="750" y="100" fill="#B0BEC5" font-family="Arial" font-size="20" text-anchor="middle">O que cria rotação na estrutura estromal é a assimetria (Forças Desiguais), não a pressão estática.</text><rect x="50" y="150" width="650" height="550" rx="15" fill="#111B24"/><rect x="800" y="150" width="650" height="550" rx="15" fill="#111B24"/><text x="350" y="200" fill="#cfd8dc" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Anel Simétrico (Mesma Espessura)</text><text x="350" y="235" fill="#78909c" font-family="Arial" font-size="18" text-anchor="middle">Força Equilibrada = Apenas Empurrão (Sem Torção)</text><circle cx="350" cy="400" r="100" fill="none" stroke="#37474f" stroke-width="8"/><circle cx="350" cy="400" r="8" fill="#546e7a"/><rect x="190" y="340" width="40" height="120" rx="10" fill="#cfd8dc" stroke="#fff" stroke-width="2"/><rect x="470" y="340" width="40" height="120" rx="10" fill="#cfd8dc" stroke="#fff" stroke-width="2"/><text x="210" y="320" fill="#cfd8dc" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">250 µm</text><text x="490" y="320" fill="#cfd8dc" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">250 µm</text><line x1="250" y1="400" x2="290" y2="400" stroke="#ff1744" stroke-width="12"/><polygon points="290,390 310,400 290,410" fill="#ff1744"/><line x1="450" y1="400" x2="410" y2="400" stroke="#ff1744" stroke-width="12"/><polygon points="410,390 390,400 410,410" fill="#ff1744"/><rect x="200" y="550" width="300" height="40" rx="5" fill="#1e2d3d"/><text x="350" y="577" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">V_Torque ≈ 0</text><text x="1150" y="200" fill="#00e5ff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Anel Assimétrico (Espessura Alargada)</text><text x="1150" y="235" fill="#78909c" font-family="Arial" font-size="18" text-anchor="middle">Força Desequilibrada = Gera Rotação Biomecânica</text><circle cx="1150" cy="400" r="100" fill="none" stroke="#2196f3" stroke-width="8" stroke-dasharray="20,10"/><circle cx="1150" cy="400" r="8" fill="#00e5ff"/><path d="M 1130 280 A 130 130 0 0 1 1260 440" fill="none" stroke="#00e5ff" stroke-width="8" marker-end="url(#arrowB)" filter="url(#glowGreen)"/><path d="M 1265 430 L 1270 450 L 1250 445 Z" fill="#00e5ff"/><rect x="990" y="360" width="30" height="80" rx="8" fill="#cfd8dc" stroke="#fff" stroke-width="2"/><rect x="1270" y="300" width="60" height="200" rx="15" fill="#cfd8dc" stroke="#fff" stroke-width="2"/><text x="1005" y="340" fill="#cfd8dc" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">150 µm</text><text x="1300" y="280" fill="#cfd8dc" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">350 µm</text><line x1="1040" y1="400" x2="1070" y2="400" stroke="#ff1744" stroke-width="6"/><polygon points="1070,393 1085,400 1070,407" fill="#ff1744"/><text x="1050" y="385" fill="#ff1744" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Fraca</text><line x1="1250" y1="400" x2="1200" y2="400" stroke="#ff1744" stroke-width="20" filter="url(#glowRed)"/><polygon points="1200,380 1170,400 1200,420" fill="#ff1744" filter="url(#glowRed)"/><text x="1230" y="375" fill="#ff1744" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">FORTE</text><rect x="1000" y="550" width="300" height="40" rx="5" fill="#1e2d3d"/><text x="1150" y="577" fill="#00e5ff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">V_Torque Altíssimo</text></svg>