oke-width="2.5" opacity="1"/><path d="M 100 440 Q 250 400 400 440" fill="none" stroke="#ffb74d" stroke-width="3" opacity="0.8"/><path d="M 800 440 L 910 440 Q 950 220 990 440 L 1100 440" fill="none" stroke="#ff1744" stroke-width="2" opacity="1"/><line x1="230" y1="450" x2="230" y2="420" stroke="#00e5ff" stroke-width="2"/><line x1="930" y1="320" x2="930" y2="200" stroke="#ff1744" stroke-width="6"/><line x1="250" y1="450" x2="250" y2="420" stroke="#00e5ff" stroke-width="2"/><line x1="950" y1="320" x2="950" y2="200" stroke="#ff1744" stroke-width="6"/><line x1="270" y1="450" x2="270" y2="420" stroke="#00e5ff" stroke-width="2"/><line x1="970" y1="320" x2="970" y2="200" stroke="#ff1744" stroke-width="6"/><text x="250" y="410" fill="#00e5ff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Tensão Baixa</text><text x="950" y="180" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Tensão Altíssima</text><line x1="400" y1="650" x2="800" y2="650" stroke="#ffb74d" stroke-width="15" marker-end="url(#arrowR)"/><text x="600" y="630" fill="#ffb74d" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">← GRADIENTE ESTRUTURAL GERANDO TORQUE →</text><text x="600" y="685" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">As fibras na transição física entre a ponta A e a ponta B são violentamente rotacionadas pelo diferencial de força.</text></svg>