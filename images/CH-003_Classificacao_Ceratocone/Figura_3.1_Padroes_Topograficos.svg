<svg viewBox="0 0 1500 750" xmlns="http://www.w3.org/2000/svg"><rect width="1500" height="750" fill="#0A0E17"/>
<defs>
    <filter id="glowCenter" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="15" result="blur" />
        <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    
    <filter id="glowOval" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="20" result="blur" />
        <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>

    <radialGradient id="heatNipple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffb74d" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#4caf50" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0288d1" stop-opacity="0.2"/>
    </radialGradient>
    
    <radialGradient id="heatOval" cx="50%" cy="65%" r="60%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ffb74d" stop-opacity="0.8"/>
      <stop offset="65%" stop-color="#4caf50" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0288d1" stop-opacity="0.2"/>
    </radialGradient>
    
    <radialGradient id="heatPMD" cx="50%" cy="90%" r="70%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="1"/>
      <stop offset="25%" stop-color="#ffb74d" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#4caf50" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0288d1" stop-opacity="0.2"/>
    </radialGradient>
</defs>
<text x="750" y="60" fill="#ffffff" font-family="Arial" font-size="34" font-weight="bold" text-anchor="middle">Figura 3.1: Evolução da Temperatura Estromal (Topografia Vetorial)</text><text x="750" y="100" fill="#B0BEC5" font-family="Arial" font-size="20" text-anchor="middle">A localização anatômica da fraqueza define a classificação primária do ceratocone.</text><rect x="50" y="150" width="400" height="550" rx="20" fill="#111B24"/><text x="250" y="200" fill="#cfd8dc" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle">1. Cone Nipple (Central)</text><text x="250" y="230" fill="#8b9ba3" font-family="Arial" font-size="16" text-anchor="middle">Ápice 100% sobre a linha do Eixo Visual</text><circle cx="250" cy="400" r="150" fill="#0288d1" opacity="0.3"/><circle cx="250" cy="400" r="100" fill="url(#heatNipple)" filter="url(#glowCenter)"/><path d="M 235 400 L 265 400 M 250 385 L 250 415" stroke="#ffffff" stroke-width="2"/><rect x="120" y="590" width="260" height="90" fill="#0e171f" rx="10"/><text x="250" y="620" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Vetor Necessário: VR (Puro)</text><text x="250" y="650" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Anel Simétrico e Aplainante</text><rect x="550" y="150" width="400" height="550" rx="20" fill="#111B24"/><text x="750" y="200" fill="#cfd8dc" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle">2. Cone Oval (Sagging)</text><text x="750" y="230" fill="#8b9ba3" font-family="Arial" font-size="16" text-anchor="middle">O peso estromal cedeu para o Setor Inferior</text><circle cx="750" cy="400" r="150" fill="#0288d1" opacity="0.3"/><ellipse cx="750" cy="440" rx="90" ry="110" fill="url(#heatOval)" filter="url(#glowOval)"/><path d="M 735 400 L 765 400 M 750 385 L 750 415" stroke="#ffffff" stroke-width="2"/><circle cx="750" cy="470" r="4" fill="#000000"/><rect x="620" y="590" width="260" height="90" fill="#0e171f" rx="10"/><text x="750" y="620" fill="#ffb74d" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Vetor Necessário: Vτ + VComa</text><text x="750" y="650" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Anel Assimétrico Progressivo</text><rect x="1050" y="150" width="400" height="550" rx="20" fill="#111B24"/><text x="1250" y="200" fill="#cfd8dc" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle">3. Global / Pelúcida</text><text x="1250" y="230" fill="#8b9ba3" font-family="Arial" font-size="16" text-anchor="middle">As lamelas deslizaram nas bordas inferiores</text><circle cx="1250" cy="400" r="150" fill="#0288d1" opacity="0.3"/><path d="M 1110 460 Q 1250 360 1390 460 Q 1250 580 1110 460 Z" fill="url(#heatPMD)" filter="url(#glowOval)"/><path d="M 1235 400 L 1265 400 M 1250 385 L 1250 415" stroke="#ffffff" stroke-width="2"/><rect x="1120" y="590" width="260" height="90" fill="#0e171f" rx="10"/><text x="1250" y="620" fill="#ff1744" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Vetor Necessário: Base Ampla</text><text x="1250" y="650" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Anel Longo e Calibroso Inferior</text></svg>