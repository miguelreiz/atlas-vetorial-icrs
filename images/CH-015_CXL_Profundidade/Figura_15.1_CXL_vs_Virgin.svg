<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="600" fill="#0A0E17"/><defs><marker id="aW" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/></marker><marker id="aG" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#00e676"/></marker><marker id="aR" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ff1744"/></marker></defs><text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 15.1: Dinâmica ICRS em Córnea Virgem vs Pós-CXL</text><text x="600" y="80" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">A trava covalente impede a distribuição circunferencial da tensão do anel</text><rect x="50" y="120" width="500" height="420" rx="15" fill="#111B24" stroke="#00e676" stroke-width="2"/><rect x="50" y="120" width="500" height="40" rx="15" fill="#00e676" opacity="0.1"/><text x="300" y="146" fill="#00e676" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">CÓRNEA KC VIRGEM</text><path d="M 80 250 Q 300 150 520 250" fill="none" stroke="#263238" stroke-width="80"/><path d="M 80 210 Q 300 110 520 210" fill="none" stroke="#0288d1" stroke-width="2"/><path d="M 80 230 Q 300 130 520 230" fill="none" stroke="#0288d1" stroke-width="2"/><path d="M 80 250 Q 300 150 520 250" fill="none" stroke="#0288d1" stroke-width="2"/><path d="M 80 270 Q 300 170 520 270" fill="none" stroke="#0288d1" stroke-width="2"/><path d="M 80 290 Q 300 190 520 290" fill="none" stroke="#0288d1" stroke-width="2"/><polygon points="170,250 200,250 185,210" fill="#ff1744" stroke="#ffffff" stroke-width="1"/><polygon points="400,250 430,250 415,210" fill="#ff1744" stroke="#ffffff" stroke-width="1"/><line x1="185" y1="200" x2="250" y2="190" stroke="#00e676" stroke-width="4" marker-end="url(#aG)"/><line x1="415" y1="200" x2="350" y2="190" stroke="#00e676" stroke-width="4" marker-end="url(#aG)"/><text x="300" y="180" fill="#00e676" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">VR Pleno: Deslizamento Livre</text><text x="300" y="440" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Fibras relaxadas e sem travas cruzadas.</text><text x="300" y="460" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">O Tenting gera arco de encurtamento</text><text x="300" y="480" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">que avança até o cone central perfeitamente.</text><rect x="650" y="120" width="500" height="420" rx="15" fill="#111B24" stroke="#ffb74d" stroke-width="2"/><rect x="650" y="120" width="500" height="40" rx="15" fill="#ffb74d" opacity="0.1"/><text x="900" y="146" fill="#ffb74d" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">CÓRNEA PÓS-CXL (Escudo Covalente)</text><path d="M 680 250 Q 900 150 1120 250" fill="none" stroke="#263238" stroke-width="80"/><path d="M 680 220 Q 900 120 1120 220" fill="none" stroke="#ffb74d" stroke-width="20" opacity="0.4"/><text x="900" y="110" fill="#ffb74d" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Placa Rígida 300μm CXL</text><path d="M 680 210 Q 900 110 1120 210" fill="none" stroke="#b388ff" stroke-width="2"/><path d="M 680 230 Q 900 130 1120 230" fill="none" stroke="#b388ff" stroke-width="2"/><path d="M 680 250 Q 900 150 1120 250" fill="none" stroke="#0288d1" stroke-width="2"/><path d="M 680 270 Q 900 170 1120 270" fill="none" stroke="#0288d1" stroke-width="2"/><path d="M 680 290 Q 900 190 1120 290" fill="none" stroke="#0288d1" stroke-width="2"/><polygon points="770,250 800,250 785,210" fill="#ff1744" stroke="#ffffff" stroke-width="1"/><polygon points="1000,250 1030,250 1015,210" fill="#ff1744" stroke="#ffffff" stroke-width="1"/><line x1="785" y1="210" x2="820" y2="200" stroke="#ff1744" stroke-width="4" marker-end="url(#aR)"/><line x1="1015" y1="210" x2="980" y2="200" stroke="#ff1744" stroke-width="4" marker-end="url(#aR)"/><line x1="785" y1="250" x2="785" y2="280" stroke="#ff1744" stroke-width="4" stroke-dasharray="4,2" marker-end="url(#aR)"/><line x1="1015" y1="250" x2="1015" y2="280" stroke="#ff1744" stroke-width="4" stroke-dasharray="4,2" marker-end="url(#aR)"/><text x="900" y="190" fill="#ff1744" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">VR Atenuado: Força bate na Barreira</text><text x="900" y="440" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">A trama anterior esclerosada repele a cunha do PMMA.</text><text x="900" y="460" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">A energia mecânica não percorre as lamelas,</text><text x="900" y="480" fill="#ffb74d" font-family="Arial" font-size="14" text-anchor="middle">sendo defletida para o estroma profundo (Mole).</text></svg>