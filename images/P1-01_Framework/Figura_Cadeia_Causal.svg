<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="600" fill="#0A0E17"/><defs><marker id="aW" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/></marker><marker id="aR" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ff1744"/></marker></defs><text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura P1.1: A Cadeia Causal Biomecânica</text><text x="600" y="80" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">PIO → Malha de Colágeno → Falência → Plácido</text><rect x="50" y="250" width="200" height="100" rx="10" fill="#111B24" stroke="#ffb74d" stroke-width="3"/><text x="150" y="290" fill="#ffb74d" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">1. PIO</text><text x="150" y="320" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">A pressão interna constante empurra</text><line x1="260" y1="300" x2="315" y2="300" stroke="#ffffff" stroke-width="4" marker-end="url(#aW)"/><rect x="330" y="250" width="220" height="100" rx="10" fill="#111B24" stroke="#00e676" stroke-width="3"/><text x="440" y="290" fill="#00e676" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">2. MALHA</text><text x="440" y="320" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Lamelas resistem, criando</text><text x="440" y="340" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">o Escudo de Colágeno</text><line x1="560" y1="300" x2="615" y2="300" stroke="#ffffff" stroke-width="4" marker-end="url(#aW)"/><rect x="630" y="250" width="220" height="100" rx="10" fill="#111B24" stroke="#ff1744" stroke-width="3"/><text x="740" y="290" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">3. FALÊNCIA</text><text x="740" y="320" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Fibras esgarçam e deslizam</text><text x="740" y="340" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">(Ectasia Local)</text><line x1="860" y1="300" x2="915" y2="300" stroke="#ffffff" stroke-width="4" marker-end="url(#aW)"/><rect x="930" y="250" width="220" height="100" rx="10" fill="#111B24" stroke="#00e5ff" stroke-width="3"/><text x="1040" y="290" fill="#00e5ff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">4. PLÁCIDO</text><text x="1040" y="320" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Superfície cede;</text><text x="1040" y="340" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Anéis comprimem</text><text x="600" y="470" fill="#ff1744" font-family="Arial" font-size="18" font-style="italic" font-weight="bold" text-anchor="middle">"Cada anel de Plácido comprimido é uma fibra de colágeno que cedeu."</text></svg>