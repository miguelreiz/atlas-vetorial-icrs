</defs><text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="30" font-weight="bold" text-anchor="middle">Figura 13.1: Os 4 Cinetipos do Fracasso Cirúrgico</text><text x="600" y="80" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">Desconstrução visual de como os vetores agem destrutivamente quando mal planejados</text><rect x="80" y="150" width="500" height="280" rx="10" fill="#111B24" stroke="#FFD700" stroke-width="2"/><rect x="80" y="150" width="500" height="40" rx="10" fill="#FFD700" opacity="0.1"/><text x="100" y="176" fill="#FFD700" font-family="Arial" font-size="18" font-weight="bold">1. COMA VERTICAL (Piora)</text><text x="560" y="176" fill="#111B24" font-family="Arial" font-size="16" font-weight="bold" text-anchor="end" stroke="#FFD700" stroke-width="0.5">Vτ Invertido</text><text x="330" y="390" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Incisão no K-Max (desalinhado do ENM)</text><text x="330" y="410" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Gira o ápice ainda mais para baixo</text><ellipse cx="330" cy="280" rx="60" ry="60" fill="none" stroke="#cfd8dc" stroke-width="2" stroke-dasharray="4,4"/><ellipse cx="330" cy="310" rx="60" ry="70" fill="none" stroke="#FFD700" stroke-width="4"/><line x1="330" y1="290" x2="330" y2="330" stroke="#FFD700" stroke-width="4" marker-end="url(#arrowO)"/><text x="410" y="280" fill="#FFD700" font-family="Arial" font-size="12">Rotação Inferior</text><rect x="620" y="150" width="500" height="280" rx="10" fill="#111B24" stroke="#0B3D91" stroke-width="2"/><rect x="620" y="150" width="500" height="40" rx="10" fill="#0B3D91" opacity="0.1"/><text x="640" y="176" fill="#0B3D91" font-family="Arial" font-size="18" font-weight="bold">2. APLAINAMENTO EXCESSIVO</text><text x="1100" y="176" fill="#111B24" font-family="Arial" font-size="16" font-weight="bold" text-anchor="end" stroke="#0B3D91" stroke-width="0.5">VR Tóxico</text><text x="870" y="390" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Anel muito espesso em córnea fina</text><text x="870" y="410" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Cria hipermetropia e abaulamento periférico</text><path d="M 770 320 Q 870 200 970 320" fill="none" stroke="#cfd8dc" stroke-width="2" stroke-dasharray="4,4"/><path d="M 770 320 Q 810 280 830 270 L 910 270 Q 930 280 970 320" fill="none" stroke="#0B3D91" stroke-width="4"/><line x1="870" y1="210" x2="870" y2="260" stroke="#0B3D91" stroke-width="5" marker-end="url(#arrowB)"/><text x="910" y="230" fill="#0B3D91" font-family="Arial" font-size="12">Hyper-Flattening</text><rect x="80" y="480" width="500" height="280" rx="10" fill="#111B24" stroke="#00B4DC" stroke-width="2"/><rect x="80" y="480" width="500" height="40" rx="10" fill="#00B4DC" opacity="0.1"/><text x="100" y="506" fill="#00B4DC" font-family="Arial" font-size="18" font-weight="bold">3. ASTIGMATISMO IRREGULAR</text><text x="560" y="506" fill="#111B24" font-family="Arial" font-size="16" font-weight="bold" text-anchor="end" stroke="#00B4DC" stroke-width="0.5">VT Conflitante</text><text x="330" y="720" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Assimetria de arco não correspondente</text><text x="330" y="740" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Incisão fora do eixo fátia o astigmatismo</text><ellipse cx="330" cy="610" rx="80" ry="40" fill="none" stroke="#cfd8dc" stroke-width="2" stroke-dasharray="4,4" transform="rotate(-30 330 610)"/><line x1="240" y1="610" x2="420" y2="610" stroke="#00B4DC" stroke-width="3" stroke-dasharray="6,4"/><text x="330" y="670" fill="#00B4DC" font-family="Arial" font-size="12" text-anchor="middle">Eixo Induzido vs Eixo Nativo</text><rect x="620" y="480" width="500" height="280" rx="10" fill="#111B24" stroke="#ff1744" stroke-width="2"/><rect x="620" y="480" width="500" height="40" rx="10" fill="#ff1744" opacity="0.1"/><text x="640" y="506" fill="#ff1744" font-family="Arial" font-size="18" font-weight="bold">4. EXTRUSÃO / MELTING</text><text x="1100" y="506" fill="#111B24" font-family="Arial" font-size="16" font-weight="bold" text-anchor="end" stroke="#ff1744" stroke-width="0.5">Vetor Endotelial ↑</text><text x="870" y="720" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Implante muito superficial (<70%)</text><text x="870" y="740" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Necrose estromal anterior isquêmica</text><path d="M 790 610 Q 870 560 950 610" fill="none" stroke="#cfd8dc" stroke-width="8"/><rect x="830" y="580" width="20" height="15" fill="#ff1744" filter="url(#glowR)"/><line x1="840" y1="595" x2="840" y2="560" stroke="#ff1744" stroke-width="4" marker-end="url(#arrowR)"/><text x="900" y="590" fill="#ff1744" font-family="Arial" font-size="12">Ruptura Epitelial</text></svg>