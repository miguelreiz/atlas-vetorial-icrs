<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg"><rect width="1000" height="800" fill="#0A0E17"/><text x="500" y="50" fill="#ffffff" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle">Figura 13.2: O Colapso das Fibras Biológicas</text><rect x="50" y="100" width="420" height="300" rx="15" fill="#111B24"/><text x="260" y="140" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">1. Extrusão (Perfuração)</text><path d="M 100 280 Q 260 180 420 280" fill="none" stroke="#ff1744" stroke-width="4"/><path d="M 230 230 L 290 230" stroke="#0A0E17" stroke-width="10"/><circle cx="260" cy="240" r="30" fill="#ffb74d" stroke="#ffffff" stroke-width="2"/><line x1="260" y1="230" x2="260" y2="160" stroke="#ff1744" stroke-width="5" marker-end="url(#arrowR)"/><text x="260" y="360" fill="#b0bec5" font-family="Arial" font-size="14" text-anchor="middle">VR excessivo + túnel raso = Rompimento Lamelar Anterior</text><rect x="530" y="100" width="420" height="300" rx="15" fill="#111B24"/><text x="740" y="140" fill="#4caf50" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">2. Haze Localizado</text><polygon points="740,200 700,270 780,270" fill="#0288d1"/><circle cx="740" cy="180" r="25" fill="#4caf50" opacity="0.6" filter="blur(5px)"/><text x="740" y="360" fill="#b0bec5" font-family="Arial" font-size="14" text-anchor="middle">Arestas vivas concentram tensão. O tecido responde com opacidade.</text><rect x="290" y="450" width="420" height="300" rx="15" fill="#1A1525"/><text x="500" y="490" fill="#b388ff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">3. Vτ Invertido (Coma Piorado)</text><polygon points="350,550 650,600 650,580 350,530" fill="#ffb74d" opacity="0.8"/><text x="400" y="650" fill="#ff1744" font-family="Arial" font-size="18" text-anchor="middle">Torção contra o Cume</text><text x="500" y="700" fill="#b0bec5" font-family="Arial" font-size="14" text-anchor="middle">Implantar a ponta grossa do lado plano empurra o cone para fora.</text></svg>