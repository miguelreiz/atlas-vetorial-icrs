<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="750" fill="#0A0E17"/>
<defs>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
</defs>
<text x="600" y="60" fill="#ffffff" font-family="Arial" font-size="32" font-weight="bold" text-anchor="middle">A Incisão como Eixo de Referência (ENM - Eixo de Não-Magnitude)</text><text x="600" y="95" fill="#B0BEC5" font-family="Arial" font-size="20" text-anchor="middle">Posicionando a entrada do túnel no meridiano plano para proteger a refração de torções residuais.</text><rect x="50" y="150" width="1100" height="550" rx="20" fill="#111B24"/><circle cx="600" cy="420" r="250" fill="none" stroke="#263238" stroke-width="4"/><circle cx="600" cy="420" r="150" fill="none" stroke="#263238" stroke-width="2" stroke-dasharray="5,5"/><circle cx="600" cy="420" r="50" fill="none" stroke="#263238" stroke-width="1" stroke-dasharray="2,2"/><line x1="750" y1="160.1923788646684" x2="450.00000000000006" y2="679.8076211353316" stroke="#ff1744" stroke-width="4" stroke-dasharray="10,5"/><text x="760" y="142.8718707889796" fill="#ff1744" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Eixo Curvo (K-max): 120°</text><line x1="340.1923788646684" y1="270" x2="859.8076211353316" y2="570" stroke="#00e5ff" stroke-width="4" stroke-dasharray="10,5"/><text x="729.9038105676658" y="475" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Eixo Plano: 30°</text><circle cx="773.2050807568878" cy="520" r="12" fill="#00e5ff" filter="url(#glowGreen)"/><line x1="773.2050807568878" y1="520" x2="893.2050807568878" y2="560" stroke="#00e5ff" stroke-width="2"/><rect x="893.2050807568878" y="545" width="250" height="30" rx="5" fill="#1e2d3d"/><text x="1018.2050807568878" y="565" fill="#00e5ff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">INCISÃO (ENM / Ponto Neutro)</text><path d="M 773.2050807568878 520 A 200 200 0 0 1 426.7949192431123 320" fill="none" stroke="#cfd8dc" stroke-width="20" stroke-linecap="round"/><rect x="100" y="180" width="380" height="150" rx="10" fill="#0A0E17" opacity="0.8"/><text x="120" y="210" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold">1. A Regra do Eixo Plano</text><text x="120" y="240" fill="#B0BEC5" font-family="Arial" font-size="16">A incisão SEMPRE é posicionada no</text><text x="120" y="260" fill="#B0BEC5" font-family="Arial" font-size="16">meridiano mais plano (ENM).</text><text x="120" y="290" fill="#00e5ff" font-family="Arial" font-size="16" font-weight="bold">→ Ele é o ponto zero do astigmatismo.</text><text x="120" y="310" fill="#00e5ff" font-family="Arial" font-size="16" font-weight="bold">→ Entrada não causa aberrações indesejadas.</text><rect x="720" y="520" width="380" height="150" rx="10" fill="#0A0E17" opacity="0.8"/><text x="740" y="550" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold">2. Envolvimento do Cone</text><text x="740" y="580" fill="#B0BEC5" font-family="Arial" font-size="16">Ao entrar pelo meridiano plano,</text><text x="740" y="600" fill="#B0BEC5" font-family="Arial" font-size="16">o corpo volumoso do anel viaja até repousar</text><text x="740" y="630" fill="#ff1744" font-family="Arial" font-size="16" font-weight="bold">→ EXATAMENTE SOBRE O EIXO CURVO.</text><text x="740" y="650" fill="#ff1744" font-family="Arial" font-size="16" font-weight="bold">→ Máxima força aplainadora no alvo certo.</text></svg>