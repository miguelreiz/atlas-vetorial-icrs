<svg viewBox="0 0 1500 850" xmlns="http://www.w3.org/2000/svg"><rect width="1500" height="850" fill="#0A0E17"/>
<defs>
    
    
    <marker id="arrowB" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00e5ff" />
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9100" />
    </marker>
</defs>
<text x="750" y="60" fill="#ffffff" font-family="Arial" font-size="34" font-weight="bold" text-anchor="middle">O Efeito de Acoplamento (Paradoxo de Poisson)</text><text x="750" y="100" fill="#B0BEC5" font-family="Arial" font-size="20" text-anchor="middle">A compressão forçada em um meridiano provoca a expansão biológica no meridiano ortogonal.</text><rect x="50" y="150" width="400" height="550" rx="20" fill="#111B24"/><text x="250" y="200" fill="#cfd8dc" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">1. Pré-Operatório (Oval)</text><text x="250" y="230" fill="#8b9ba3" font-family="Arial" font-size="16" text-anchor="middle">Alta diferença entre os Eixos</text><ellipse cx="250" cy="470" rx="100" ry="160" fill="none" stroke="#78909c" stroke-width="4" stroke-dasharray="10,5"/><line x1="250" y1="270" x2="250" y2="670" stroke="#455a64" stroke-width="2"/><line x1="120" y1="470" x2="380" y2="470" stroke="#455a64" stroke-width="2"/><rect x="165" y="275" width="170" height="30" fill="#111B24"/><text x="250" y="295" fill="#00e5ff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Eixo Mais Curvo</text><rect x="110" y="435" width="95" height="30" fill="#111B24"/><text x="155" y="455" fill="#ff9100" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Eixo Plano</text><rect x="550" y="150" width="400" height="550" rx="20" fill="#111B24"/><text x="750" y="200" fill="#00e5ff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">2. Compressão Focal</text><text x="750" y="230" fill="#8b9ba3" font-family="Arial" font-size="16" text-anchor="middle">O ICRS achata o Meridiano Curvo</text><ellipse cx="750" cy="470" rx="100" ry="120" fill="none" stroke="#00e5ff" stroke-width="6"/><ellipse cx="750" cy="470" rx="100" ry="160" fill="none" stroke="#78909c" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/><line x1="750" y1="250" x2="750" y2="335" stroke="#00e5ff" stroke-width="12" marker-end="url(#arrowB)"/><line x1="750" y1="690" x2="750" y2="605" stroke="#00e5ff" stroke-width="12" marker-end="url(#arrowB)"/><rect x="590" y="350" width="320" height="40" fill="#0A0E17" rx="5" opacity="0.9"/><text x="750" y="375" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">ΔK Negativo (Aplainamento)</text><rect x="1050" y="150" width="400" height="550" rx="20" fill="#111B24"/><text x="1250" y="200" fill="#ff9100" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">3. Reação de Acoplamento</text><text x="1250" y="230" fill="#8b9ba3" font-family="Arial" font-size="16" text-anchor="middle">O Meridiano Plano é fisicamente estufado</text><ellipse cx="1250" cy="470" rx="140" ry="120" fill="none" stroke="#ff9100" stroke-width="6"/><ellipse cx="1250" cy="470" rx="100" ry="120" fill="none" stroke="#00e5ff" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/><line x1="1190" y1="470" x2="1095" y2="470" stroke="#ff9100" stroke-width="12" marker-end="url(#arrowR)"/><line x1="1310" y1="470" x2="1405" y2="470" stroke="#ff9100" stroke-width="12" marker-end="url(#arrowR)"/><rect x="1090" y="530" width="320" height="40" fill="#0A0E17" rx="5" opacity="0.9"/><text x="1250" y="556" fill="#ff9100" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">ΔK Positivo (Encurvamento)</text><rect x="50" y="730" width="1400" height="80" rx="15" fill="#1e2d3d"/><text x="750" y="765" fill="#ffffff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Causalidade Física: O VT não atua diretamente nos dois eixos.</text><text x="750" y="795" fill="#00e5ff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Ele esmaga o Curvo <tspan fill="#ffffff">e a lei de conservação de tensão encarrega-se de</tspan> <tspan fill="#ff9100">estufar o Plano</tspan>.</text></svg>