<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg"><rect width="1000" height="800" fill="#0A0E17"/><text x="500" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 10.3: Matriz de Risco (A Equação Pós-Operatória)</text><text x="500" y="80" fill="#cfd8dc" font-family="Arial" font-size="18" text-anchor="middle">Resultado Cirúrgico = VEsférico (Sucesso Mecânico)  ×  ICE-min (Sucesso Sensorial)</text><text x="550" y="120" fill="#B0BEC5" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Coerência Funcional (ICE)</text><text x="350" y="145" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">ALTO (&gt;0.8)</text><text x="750" y="145" fill="#ff1744" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">BAIXO (&lt;0.5)</text><text x="90" y="400" fill="#B0BEC5" font-family="Arial" font-size="22" font-weight="bold" transform="rotate(-90 90 400)" text-anchor="middle">Soma Mecânica (VEsférico)</text><text x="140" y="275" fill="#00e676" font-family="Arial" font-size="18" font-weight="bold" transform="rotate(-90 140 275)" text-anchor="middle">ÓTIMO (&gt; 3D)</text><text x="140" y="525" fill="#ffb74d" font-family="Arial" font-size="18" font-weight="bold" transform="rotate(-90 140 525)" text-anchor="middle">RUIM (&lt; 1D)</text><rect x="150" y="150" width="400" height="250" fill="#112A22" stroke="#00e676" stroke-width="4"/><text x="350" y="250" fill="#00e676" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">1. EXCELENTE</text><text x="350" y="290" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">A mecânica curou e a visão decodificou</text><text x="350" y="320" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">+4.2 Linhas Acuidade Visual</text><rect x="550" y="150" width="400" height="250" fill="#1E1528" stroke="#b388ff" stroke-width="4"/><text x="750" y="250" fill="#b388ff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">2. FRUSTRANTE</text><text x="750" y="290" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">Anel funcionou bem, Cérebro negou imagem</text><text x="750" y="320" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">+1.2 Linhas Acuidade Visual</text><rect x="150" y="400" width="400" height="250" fill="#281A11" stroke="#ffb74d" stroke-width="4"/><text x="350" y="500" fill="#ffb74d" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">3. SUBÓTIMO</text><text x="350" y="540" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">Anel limitou ganho, Cérebro queria enxergar mais</text><text x="350" y="570" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">+2.5 Linhas Acuidade Visual</text><rect x="550" y="400" width="400" height="250" fill="#2A1115" stroke="#ff1744" stroke-width="4"/><text x="750" y="500" fill="#ff1744" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">4. FRACASSO CLÍNICO</text><text x="750" y="540" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">Erro de Posicionamento + Incoerente</text><text x="750" y="570" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">+0.5 Linhas / 78% Explante</text></svg>