<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg"><rect width="1000" height="700" fill="#0A0E17"/><text x="500" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 16.4: O Modelo de 4 Camadas</text><text x="500" y="80" fill="#b0bec5" font-family="Arial" font-size="16" text-anchor="middle">Como o estroma projeta sua malha para a superfície topográfica</text><rect x="250" y="150" width="700" height="90" rx="15" fill="#111B24" stroke="#b388ff" stroke-width="3"/><rect x="250" y="150" width="200" height="90" rx="15" fill="#b388ff" opacity="0.2"/><text x="350" y="185" fill="#b388ff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">CAMADA 4</text><text x="350" y="210" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">EPITÉLIO</text><text x="470" y="185" fill="#b388ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="start">Reativador de Superfície</text><text x="470" y="215" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="start">Migra em espiral. Afina onde há cume, engrossa sobre os vales (efeito donut).</text><rect x="250" y="260" width="700" height="90" rx="15" fill="#111B24" stroke="#cfd8dc" stroke-width="3"/><rect x="250" y="260" width="200" height="90" rx="15" fill="#cfd8dc" opacity="0.2"/><text x="350" y="295" fill="#cfd8dc" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">CAMADA 3</text><text x="350" y="320" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">BOWMAN + MOLAS</text><text x="470" y="295" fill="#cfd8dc" font-family="Arial" font-size="18" font-weight="bold" text-anchor="start">Ancoragem Anterior</text><text x="470" y="325" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="start">As Bow Springs ('cabos de suspensão') seguram a Bowman, impedindo flutuação.</text><rect x="250" y="370" width="700" height="90" rx="15" fill="#111B24" stroke="#00e676" stroke-width="3"/><rect x="250" y="370" width="200" height="90" rx="15" fill="#00e676" opacity="0.2"/><text x="350" y="405" fill="#00e676" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">CAMADA 2</text><text x="350" y="430" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">MALHA ANTERIOR (FELTRO)</text><text x="470" y="405" fill="#00e676" font-family="Arial" font-size="18" font-weight="bold" text-anchor="start">Oblíquas Interlamelares</text><text x="470" y="435" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="start">Rigidez estrutural 4x maior. É AQUI que a frouxidão do ceratocone começa.</text><rect x="250" y="480" width="700" height="90" rx="15" fill="#111B24" stroke="#0288d1" stroke-width="3"/><rect x="250" y="480" width="200" height="90" rx="15" fill="#0288d1" opacity="0.2"/><text x="350" y="515" fill="#0288d1" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">CAMADA 1</text><text x="350" y="540" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">MALHA POSTERIOR (ORTOGONAL)</text><text x="470" y="515" fill="#0288d1" font-family="Arial" font-size="18" font-weight="bold" text-anchor="start">Radiais e Tangenciais Paralelas</text><text x="470" y="545" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="start">Fácil dissecção local. A base onde a PIO empurra de baixo para cima.</text><line x1="180" y1="620" x2="180" y2="520" stroke="#ff1744" stroke-width="8" marker-end="url(#arrowR)"/><text x="180" y="650" fill="#ff1744" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">PIO empurra</text><line x1="180" y1="50" x2="180" y2="130" stroke="#ffb74d" stroke-width="8" marker-end="url(#arrowO)"/><text x="180" y="40" fill="#ffb74d" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Plácido LÊ a C4</text><rect x="50" y="370" width="150" height="200" rx="10" fill="#00e5ff" opacity="0.1" stroke="#00e5ff" stroke-width="2" stroke-dasharray="5,5"/><text x="125" y="450" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">ICRS</text><text x="125" y="475" fill="#00e5ff" font-family="Arial" font-size="12" text-anchor="middle">Separando C1</text></svg>