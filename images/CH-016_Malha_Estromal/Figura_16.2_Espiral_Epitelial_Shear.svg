l="#00e676" font-family="Arial" font-size="16" font-weight="bold">• A Orquestra Biomecânica</text><text x="690" y="380" fill="#b0bec5" font-family="Arial" font-size="14">O colágeno (fibras) orienta-se</text><text x="690" y="400" fill="#b0bec5" font-family="Arial" font-size="14">pela pressão (PIO).</text><text x="670" y="440" fill="#ffb74d" font-family="Arial" font-size="16" font-weight="bold">• O Rastro Epitelial</text><text x="690" y="470" fill="#b0bec5" font-family="Arial" font-size="14">As células (Roxo) recém-nascidas no</text><text x="690" y="490" fill="#b0bec5" font-family="Arial" font-size="14">limbo deslizam obrigatoriamente</text><text x="690" y="510" fill="#b0bec5" font-family="Arial" font-size="14">sobre as linhas geradas pelo τ_max.</text><circle cx="670" cy="550" r="10" fill="#b388ff"/><text x="690" y="555" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">Migração Celular (Vórtex)</text></svg>