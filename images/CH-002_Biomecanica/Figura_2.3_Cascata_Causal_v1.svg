<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="700" fill="#0A0E17"/><text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 2.3: A Cascata Causal do ICRS</text><text x="600" y="80" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">Um único fenômeno físico atuando em 3 escalas dimensionais diferentes</text><defs>
    <filter id="glowF" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowW" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/></marker>
    <marker id="arrowC" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#00e5ff"/></marker>
</defs><rect x="50" y="120" width="360" height="500" rx="15" fill="#111B24" stroke="#00e676" stroke-width="2"/><rect x="50" y="120" width="360" height="60" rx="15" fill="#00e676" opacity="0.1"/><text x="230" y="150" fill="#00e676" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">1. ESCALA MICRO</text><text x="230" y="170" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Efeito Físico: TENTING</text><line x1="420" y1="370" x2="460" y2="370" stroke="#ffffff" stroke-width="4" marker-end="url(#arrowW)"/><rect x="420" y="120" width="360" height="500" rx="15" fill="#111B24" stroke="#FFD700" stroke-width="2"/><rect x="420" y="120" width="360" height="60" rx="15" fill="#FFD700" opacity="0.1"/><text x="600" y="150" fill="#FFD700" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">2. ESCALA MESO</text><text x="600" y="170" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Efeito Anatômico: ARC-SHORTENING</text><line x1="790" y1="370" x2="830" y2="370" stroke="#ffffff" stroke-width="4" marker-end="url(#arrowW)"/><rect x="790" y="120" width="360" height="500" rx="15" fill="#111B24" stroke="#0B3D91" stroke-width="2"/><rect x="790" y="120" width="360" height="60" rx="15" fill="#0B3D91" opacity="0.1"/><text x="970" y="150" fill="#0B3D91" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">3. ESCALA MACRO</text><text x="970" y="170" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Efeito Óptico: BARRACA (BARRAQUER)</text><text x="230" y="230" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">A inserção do volume de PMMA separa</text><text x="230" y="250" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">fisicamente as lamelas de colágeno.</text><path d="M 100 360 L 360 360" fill="none" stroke="#0288d1" stroke-width="4" stroke-dasharray="10,5"/><path d="M 100 400 L 360 400" fill="none" stroke="#0288d1" stroke-width="4" stroke-dasharray="10,5"/><polygon points="210,390 250,390 230,350" fill="#ff1744" stroke="#ffffff" stroke-width="2"/><path d="M 100 380 Q 170 380 230 330 Q 290 380 360 380" fill="none" stroke="#00e676" stroke-width="5"/><text x="230" y="310" fill="#00e676" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Vetor de Tenting (Elevação Local)</text><line x1="230" y1="320" x2="230" y2="345" stroke="#00e676" stroke-width="3" marker-end="url(#arrowW)"/><text x="600" y="230" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">A elevação local (Tenting) consome</text><text x="600" y="250" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">uma extensão de arco, tensionando o centro.</text><path d="M 480 450 A 130 130 0 0 1 720 450" fill="none" stroke="#546e7a" stroke-width="3" stroke-dasharray="5,5"/><path d="M 480 450 
           Q 510 440 530 410
           A 180 180 0 0 1 670 410
           Q 690 440 720 450" 
      fill="none" stroke="#FFD700" stroke-width="5" filter="url(#glowF)"/><circle cx="525" cy="425" r="8" fill="#ff1744"/><circle cx="675" cy="425" r="8" fill="#ff1744"/><line x1="560" y1="390" x2="530" y2="410" stroke="#00e5ff" stroke-width="3" marker-end="url(#arrowC)"/><line x1="640" y1="390" x2="670" y2="410" stroke="#00e5ff" stroke-width="3" marker-end="url(#arrowC)"/><text x="600" y="350" fill="#00e5ff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Encurtamento (Tração Lateral)</text><text x="970" y="230" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">O encurtamento enrijece a tenda.</text><text x="970" y="250" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">A Córnea perde curvatura K (Aplainamento).</text><path d="M 850 450 Q 970 300 1090 450" fill="none" stroke="#ff1744" stroke-width="3" stroke-dasharray="5,5"/><path d="M 850 450 Q 970 370 1090 450" fill="none" stroke="#0B3D91" stroke-width="6" filter="url(#glowF)"/><line x1="970" y1="310" x2="970" y2="360" stroke="#0B3D91" stroke-width="5" marker-end="url(#arrowW)"/><line x1="940" y1="320" x2="940" y2="370" stroke="#0B3D91" stroke-width="4" marker-end="url(#arrowW)"/><line x1="1000" y1="320" x2="1000" y2="370" stroke="#0B3D91" stroke-width="4" marker-end="url(#arrowW)"/><text x="970" y="280" fill="#0B3D91" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Vetor Radial (VR) Dominante</text><rect x="840" y="480" width="260" height="70" rx="10" fill="#0A0E17" stroke="#ffffff" stroke-width="2"/><text x="970" y="510" fill="#00e676" font-family="Courier New" font-size="16" font-weight="bold" text-anchor="middle">LEI DE BARRAQUER</text><text x="970" y="530" fill="#ffffff" font-family="Courier New" font-size="13" text-anchor="middle">Adicionar na preferia = Achatamento central</text></svg>