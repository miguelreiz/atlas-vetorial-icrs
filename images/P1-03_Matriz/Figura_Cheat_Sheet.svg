<svg viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="650" fill="#0A0E17"/><text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura P3.2: Cheat Sheet — Do Fenótipo à Prescrição</text><rect x="50" y="100" width="1100" height="50" fill="#111B24" stroke="#cfd8dc" stroke-width="1"/><text x="150" y="132" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Fenótipo (Plácido)</text><text x="450" y="132" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Assinatura de Coma</text><text x="750" y="132" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Vetor Dominante</text><text x="1000" y="132" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Caixa Cirúrgica</text><rect x="50" y="150" width="1100" height="80" fill="#0B1220" stroke="#263238" stroke-width="1"/><text x="150" y="195" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">P1 Circular</text><text x="450" y="195" fill="#b388ff" font-family="Arial" font-size="16" text-anchor="middle">Z2 dominante</text><rect x="650" y="175" width="200" height="30" rx="5" fill="#FFD700" opacity="0.2"/><text x="750" y="195" fill="#FFD700" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">VT (Tangencial)</text><text x="1000" y="195" fill="#00e676" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Simétrico Curto/Longo</text><rect x="50" y="230" width="1100" height="80" fill="#0A0E17" stroke="#263238" stroke-width="1"/><text x="150" y="275" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">P2 Oval</text><text x="450" y="275" fill="#b388ff" font-family="Arial" font-size="16" text-anchor="middle">Z(3,-1) Vertical Alto</text><rect x="650" y="255" width="200" height="30" rx="5" fill="#FFD700" opacity="0.2"/><text x="750" y="275" fill="#FFD700" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Vτ dominante + VR local</text><text x="1000" y="275" fill="#00e676" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Assimétrico Único Inf.</text><rect x="50" y="310" width="1100" height="80" fill="#0B1220" stroke="#263238" stroke-width="1"/><text x="150" y="355" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">P3 Duck</text><text x="450" y="355" fill="#b388ff" font-family="Arial" font-size="16" text-anchor="middle">Eixo Coma = Eixo Topo?</text><rect x="650" y="335" width="200" height="30" rx="5" fill="#FFD700" opacity="0.2"/><text x="750" y="355" fill="#FFD700" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Vτ (T1) ou Fτ/ENM (T2)</text><text x="1000" y="355" fill="#00e676" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">160-210° Ponta Grossa Polo</text><rect x="50" y="390" width="1100" height="80" fill="#0A0E17" stroke="#263238" stroke-width="1"/><text x="150" y="435" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">P4 Snowman</text><text x="450" y="435" fill="#b388ff" font-family="Arial" font-size="16" text-anchor="middle">Múltiplos Polos (Alto Z3-1)</text><rect x="650" y="415" width="200" height="30" rx="5" fill="#FFD700" opacity="0.2"/><text x="750" y="435" fill="#FFD700" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Duplo VR + Vτ Coaxial</text><text x="1000" y="435" fill="#00e676" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Base Flexível (Ex: AJL Pro+)</text><rect x="50" y="470" width="1100" height="80" fill="#0B1220" stroke="#263238" stroke-width="1"/><text x="150" y="515" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">P5 Complexo</text><text x="450" y="515" fill="#b388ff" font-family="Arial" font-size="16" text-anchor="middle">HOA Caótico Elevadíssimo</text><rect x="650" y="495" width="200" height="30" rx="5" fill="#FFD700" opacity="0.2"/><text x="750" y="515" fill="#FFD700" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Irreconhecível</text><text x="1000" y="515" fill="#00e676" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Planejamento Personalizado CXL</text><text x="600" y="600" fill="#cfd8dc" font-family="Arial" font-size="16" font-style="italic" text-anchor="middle">Regra de Ouro: Uma discrepância axial entre o K-Max e o Coma > 20° desabona qualquer topografia — você deve guiar pelo ENM.</text></svg>