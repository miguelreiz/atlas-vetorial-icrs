</defs><text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 8.1 / 9.1: A Equação Mestra (A Soma Vetorial)</text><text x="600" y="80" fill="#b0bec5" font-family="Arial" font-size="16" text-anchor="middle">Os 4 eixos de ação biomecânica se fundem para criar o Resultado Clínico (ROI).</text><rect x="50" y="120" width="400" height="380" rx="20" fill="#111B24" stroke="#263238" stroke-width="2"/><text x="250" y="160" fill="#cfd8dc" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Os Vetores Componentes (Ferramentas)</text><line x1="100" y1="220" x2="250" y2="220" stroke="#0288d1" stroke-width="8" marker-end="url(#arrowB)"/><text x="280" y="225" fill="#0288d1" font-family="Arial" font-size="18" font-weight="bold">VR (Aplainamento)</text><line x1="100" y1="290" x2="210" y2="290" stroke="#ff1744" stroke-width="8" marker-end="url(#arrowR)"/><text x="280" y="295" fill="#ff1744" font-family="Arial" font-size="18" font-weight="bold">VT (Redistribuição)</text><line x1="100" y1="360" x2="280" y2="360" stroke="#ffb74d" stroke-width="8" marker-end="url(#arrowO)"/><text x="310" y="365" fill="#ffb74d" font-family="Arial" font-size="18" font-weight="bold">Vτ (Torque/Cunha)</text><line x1="100" y1="430" x2="180" y2="430" stroke="#b388ff" stroke-width="8" marker-end="url(#arrowP)"/><text x="280" y="435" fill="#b388ff" font-family="Arial" font-size="18" font-weight="bold">VComa (Óptico)</text><text x="500" y="330" fill="#ffffff" font-family="Arial" font-size="60" font-weight="bold" text-anchor="middle">+</text><rect x="550" y="120" width="550" height="380" rx="20" fill="#111B24" stroke="#00e676" stroke-width="3"/><text x="825" y="160" fill="#00e676" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">O VEsférico (Foco e BCVA Resultante)</text><line x1="600" y1="320" x2="1050" y2="320" stroke="#00e676" stroke-width="20" marker-end="url(#arrowG)"/><rect x="50" y="520" width="105