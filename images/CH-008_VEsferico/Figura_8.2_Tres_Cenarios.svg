</defs><text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 8.2: O Cancelamento de Forças no Planejamento Cirúrgico</text><rect x="50" y="100" width="340" height="400" rx="15" fill="#111B24"/><text x="220" y="140" fill="#00e676" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Cenário 1: Sinergia</text><text x="220" y="170" fill="#8b9ba3" font-family="Arial" font-size="16" text-anchor="middle">Planejamento e Eixos Corretos</text><line x1="80" y1="250" x2="250" y2="250" stroke="#0288d1" stroke-width="8" marker-end="url(#aV1)" /><text x="165" y="240" fill="#0288d1" font-family="Arial" font-size="16" font-weight="bold">VR (100)</text><line x1="250" y1="250" x2="350" y2="250" stroke="#ffb74d" stroke-width="8" marker-end="url(#aV2)" /><text x="300" y="240" fill="#ffb74d" font-family="Arial" font-size="16" font-weight="bold">Vτ (50)</text><line x1="80" y1="350" x2="350" y2="350" stroke="#00e676" stroke-width="12" marker-end="url(#aR)"/><text x="215" y="325" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold">VEsférico = 150 (MÁXIMO)</text><rect x="430" y="100" width="340" height="400" rx="15" fill="#111B24"/><text x="600" y="140" fill="#ffb74d" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Cenário 2: Subótimo</text><text x="600" y="170" fill="#8b9ba3" font-family="Arial" font-size="16" text-anchor="middle">Posicionamento Desalinhado</text><line x1="480" y1="280" x2="650" y2="280" stroke="#0288d1" stroke-width="8" marker-end="url(#aV1)" /><text x="565" y="270" fill="#0288d1" font-family="Arial" font-size="16" font-weight="bold">VR (100)</text><line x1="650" y1="280" x2="650" y2="200" stroke="#ffb74d" stroke-width="8" marker-end="url(#aV2)" /><text x="680" y="240" fill="#ffb74d" font-family="Arial" font-size="16" font-weight="bold">Vτ (50)</text><line x1="480" y1="380" x2="650" y2="380" stroke="#00e676" stroke-width="12" marker-end="url(#aR)" /><text x="565" y="360" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold">VEsférico = 111</text><text x="600" y="420" fill="#8b9ba3" font-family="Arial" font-size="14" text-anchor="middle">Cria astigmatismo irregular (coma)</text><rect x="810" y="100" width="340" height="400" rx="15" fill="#111B24"/><text x="980" y="140" fill="#ff1744" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Cenário 3: Oposição</text><text x="980" y="170" fill="#8b9ba3" font-family="Arial" font-size="16" text-anchor="middle">Anel Invertido / Erro Eixo Crasso</text><line x1="900" y1="260" x2="1070" y2="260" stroke="#0288d1" stroke-width="8" marker-end="url(#aV1)" /><text x="985" y="250" fill="#0288d1" font-family="Arial" font-size="16" font-weight="bold">VR (100)</text><line x1="1070" y1="280" x2="970" y2="280" stroke="#ff1744" stroke-width="8" marker-end="url(#aV2)" /><text x="1000" y="300" fill="#ff1744" font-family="Arial" font-size="16" font-weight="bold">Vτ Reverte (-50)</text><line x1="900" y1="380" x2="970" y2="380" stroke="#ff1744" stroke-width="12" marker-end="url(#aR)" /><text x="935" y="360" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold">VEsférico = 50</text><text x="980" y="420" fill="#8b9ba3" font-family="Arial" font-size="14" text-anchor="middle">Efeito mínimo, altíssima aberração!</text><rect x="50" y="550" width="1100" height="80" rx="10" fill="#0e171f"/><text x="600" y="585" fill="#ffffff" font-family="Arial" font-size="18" text-anchor="middle">O Sucesso Clínico de um anel NÃO está apenas em colocar o segmento mais grosso possível,</text><text x="600" y="615" fill="#ffffff" font-family="Arial" font-size="18" text-anchor="middle">mas sim em garantir que a direção vetorial do plano cirúrgico faça Forças Coerentes trabalharem juntas.</text></svg>