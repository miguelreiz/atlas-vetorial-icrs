<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg"><rect width="1000" height="600" fill="#0A0E17"/><text x="500" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 11.2: O Motor do Nomograma Mestre</text><text x="500" y="80" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">Matching Perfil (Geometria do Plástico) vs Ectasia (Problema Mecânico)</text><rect x="200" y="90" width="400" height="50" fill="#0288d1" opacity="0.2"/><text x="400" y="120" fill="#0288d1" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Aplainamento Puro (VR)</text><rect x="600" y="90" width="400" height="50" fill="#ffb74d" opacity="0.2"/><text x="800" y="120" fill="#ffb74d" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Aplainamento + Torque (VR + VComa)</text><rect x="50" y="150" width="140" height="120" fill="#111B24"/><text x="120" y="210" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Cone Central</text><rect x="200" y="150" width="400" height="120" fill="#112A22" stroke="#00e676" stroke-width="2"/><text x="400" y="190" fill="#00e676" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">✅ Segmento Simétrico</text><text x="400" y="220" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">210° a 320° graus. Espessura Uniforme.</text><rect x="600" y="150" width="400" height="120" fill="#2A1115" stroke="#ff1744" stroke-width="2"/><text x="800" y="190" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">❌ Contraindicado</text><text x="800" y="220" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">O Torque iria descentrar a córnea normal.</text><rect x="50" y="270" width="140" height="120" fill="#111B24"/><text x="120" y="330" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Cone Sagging</text><rect x="200" y="270" width="400" height="120" fill="#281A11" stroke="#ffb74d" stroke-width="2"/><text x="400" y="310" fill="#ffb74d" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">⚠️ Subótimo (Parcial)</text><text x="400" y="340" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">Muda a dioptria mas o paciente segue vendo mal.</text><rect x="600" y="270" width="400" height="120" fill="#112A22" stroke="#00e676" stroke-width="2"/><text x="800" y="310" fill="#00e676" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">✅ Segmento Progressivo</text><text x="800" y="340" fill="#cfd8dc" font-family="Arial" font-size="14" text-anchor="middle">160° a 210°. Espessura em Cunha (Torque).</text></svg>