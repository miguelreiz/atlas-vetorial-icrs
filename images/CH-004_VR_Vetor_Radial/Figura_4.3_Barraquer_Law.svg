<text x="600" y="60" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 4.3: A Lei de Barraquer e a Biomecânica Corneana</text><text x="600" y="90" fill="#B0BEC5" font-family="Arial" font-size="18" text-anchor="middle">Dois caminhos mecânicos independentes conducentes ao mesmo efeito termodinâmico: Aplainamento Central.</text><path d="M 50 500 Q 300 150 550 500 L 550 510 Q 300 170 50 510 Z" fill="none" stroke="#78909c" stroke-width="2" stroke-dasharray="6,6" opacity="0.8"/><path d="M 200 270 Q 300 300 400 270 Q 300 130 200 270 Z" fill="#00e5ff" opacity="0.3" filter="url(#glowCyan)"/><text x="300" y="180" fill="#00e5ff" font-family="Arial" font-size="16" font-style="italic" font-weight="bold" text-anchor="middle">Tecido Removido (Ablação)</text><line x1="240" y1="120" x2="240" y2="200" stroke="#00e5ff" stroke-width="3" stroke-dasharray="4,2"/><polygon points="240,205 235,195 245,195" fill="#00e5ff"/><line x1="270" y1="120" x2="270" y2="200" stroke="#00e5ff" stroke-width="3" stroke-dasharray="4,2"/><polygon points="270,205 265,195 275,195" fill="#00e5ff"/><line x1="300" y1="120" x2="300" y2="200" stroke="#00e5ff" stroke-width="3" stroke-dasharray="4,2"/><polygon points="300,205 295,195 305,195" fill="#00e5ff"/><line x1="330" y1="120" x2="330" y2="200" stroke="#00e5ff" stroke-width="3" stroke-dasharray="4,2"/><polygon points="330,205 325,195 335,195" fill="#00e5ff"/><line x1="360" y1="120" x2="360" y2="200" stroke="#00e5ff" stroke-width="3" stroke-dasharray="4,2"/><polygon points="360,205 355,195 365,195" fill="#00e5ff"/><path d="M 50 500 Q 150 300 200 270 Q 300 300 400 270 Q 450 300 550 500" fill="none" stroke="#4dd0e1" stroke-width="6"/><text x="300" y="330" fill="#4dd0e1" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">APLAINAMENTO</text><rect x="100" y="570" width="400" height="70" rx="10" fill="#1e2d3d"/><text x="300" y="600" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">PRK / LASIK (Lei Original)</text><text x="300" y="625" fill="#B0BEC5" font-family="Arial" font-size="16" text-anchor="middle">Remover massa central = Centro mais plano</text><path d="M 650 500 Q 900 150 1150 500 L 1150 510 Q 900 170 650 510 Z" fill="none" stroke="#78909c" stroke-width="2" stroke-dasharray="6,6" opacity="0.8"/><polygon points="740,330 780,270 820,330" fill="#cfd8dc" stroke="#ffffff" stroke-width="2"/><polygon points="980,330 1020,270 1060,330" fill="#cfd8dc" stroke="#ffffff" stroke-width="2"/><text x="700" y="300" fill="#cfd8dc" font-family="Arial" font-size="16" font-style="italic" font-weight="bold" text-anchor="middle">Tecido Adicionado</text><text x="1100" y="300" fill="#cfd8dc" font-family="Arial" font-size="16" font-style="italic" font-weight="bold" text-anchor="middle">Tecido Adicionado</text><line x1="760" y1="310" x2="700" y2="310" stroke="#ff1744" stroke-width="5"/><polygon points="695,310 705,320 705,300" fill="#ff1744"/><line x1="1040" y1="310" x2="1100" y2="310" stroke="#ff1744" stroke-width="5"/><polygon points="1105,310 1095,320 1095,300" fill="#ff1744"/><path d="M 650 500 Q 720 330 780 260 Q 900 350 1020 260 Q 1080 330 1150 500" fill="none" stroke="#4dd0e1" stroke-width="6"/><text x="900" y="330" fill="#4dd0e1" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">APLAINAMENTO</text><text x="900" y="300" fill="#ffb74d" font-family="Arial" font-size="14" font-weight="bold" font-style="italic" text-anchor="middle">Tensão Estromal Oposta</text><rect x="700" y="570" width="400" height="70" rx="10" fill="#1e2d3d"/><text x="900" y="600" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">ICRS (Biomecânica Vetorial)</text><text x="900" y="625" fill="#B0BEC5" font-family="Arial" font-size="16" text-anchor="middle">Adicionar massa periférica = Centro mais plano</text></svg>