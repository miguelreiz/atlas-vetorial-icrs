</defs><text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 7.1: O Que é Coma? A Analogia do Farol</text><text x="600" y="80" fill="#B0BEC5" font-family="Arial" font-size="16" text-anchor="middle">O VComa mede a distorção luminosa gerada pelo desvio do centro óptico da córnea.</text><rect x="50" y="120" width="1100" height="200" rx="10" fill="#111B24"/><text x="70" y="150" fill="#00e5ff" font-family="Arial" font-size="20" font-weight="bold">Visão Sem Coma (Ápice Centralizado)</text><ellipse cx="150" cy="220" rx="20" ry="40" fill="#cfd8dc" stroke="#fff" stroke-width="2"/><polygon points="170,200 900,160 900,280 170,240" fill="url(#beam1)"/><circle cx="900" cy="220" r="30" fill="#00e5ff" filter="url(#glow)"/><text x="960" y="225" fill="#ffffff" font-family="Arial" font-size="18">Ponto Focal Limpo (Sem distorção)</text><rect x="50" y="350" width="1100" height="200" rx="10" fill="#111B24"/><text x="70" y="380" fill="#ff1744" font-family="Arial" font-size="20" font-weight="bold">Visão Com Coma (Ápice Descentrado)</text><ellipse cx="150" cy="450" rx="20" ry="40" fill="#cfd8dc" stroke="#ff1744" stroke-width="4" transform="rotate(-15 150 450)"/><polygon points="170,430 900,380 900,520 170,470" fill="url(#beam2)"/><circle cx="900" cy="420" r="20" fill="#ffb74d" filter="url(#glow)"/><ellipse cx="900" cy="470" rx="15" ry="40" fill="#ff1744" filter="url(#glow)" opacity="0.6"/><text x="960" y="455" fill="#ffffff" font-family="Arial" font-size="18">"Cauda de Cometa" (Borrão Visual)</text></svg>