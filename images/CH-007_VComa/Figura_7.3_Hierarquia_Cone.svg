<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="600" fill="#0A0E17"/><text x="600" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Figura 7.3: Hierarquia de Vetores Cirúrgicos por Fenótipo</text><rect x="50" y="100" width="530" height="450" rx="15" fill="#11151A" stroke="#00e5ff" stroke-width="2"/><rect x="620" y="100" width="530" height="450" rx="15" fill="#11151A" stroke="#ffb74d" stroke-width="2"/><text x="315" y="150" fill="#00e5ff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Cone Central (Nipple)</text><circle cx="315" cy="260" r="70" fill="none" stroke="#263238" stroke-width="2"/><circle cx="315" cy="260" r="30" fill="#ff1744" opacity="0.8"/><text x="315" y="380" fill="#00e5ff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">PRIORIDADE: VR</text><text x="315" y="420" fill="#90a4ae" font-family="Arial" font-size="18" text-anchor="middle">Aplainamento central puro.</text><text x="315" y="450" fill="#90a4ae" font-family="Arial" font-size="18" text-anchor="middle">Coma já é baixo por natureza.</text><rect x="180" y="480" width="270" height="40" rx="5" fill="#00e5ff" opacity="0.2"/><text x="315" y="506" fill="#00e5ff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Ferramenta: Anel Simétrico</text><text x="885" y="150" fill="#ffb74d" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Cone Descentrado (Sagging)</text><circle cx="885" cy="260" r="70" fill="none" stroke="#263238" stroke-width="2"/><ellipse cx="885" cy="300" rx="40" ry="25" fill="#ff1744" opacity="0.8"/><text x="885" y="380" fill="#ffb74d" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">PRIORIDADE: VComa</text><text x="885" y="420" fill="#90a4ae" font-family="Arial" font-size="18" text-anchor="middle">Trazer o ápice para a pupila.</text><text x="885" y="450" fill="#90a4ae" font-family="Arial" font-size="18" text-anchor="middle">Deslocar é mais vital que aplainar.</text><rect x="750" y="480" width="270" height="40" rx="5" fill="#ffb74d" opacity="0.2"/><text x="885" y="506" fill="#ffb74d" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Ferramenta: Anel Assimétrico/Torque</text></svg>