<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg"><rect width="1000" height="500" fill="#0A0E17"/><text x="500" y="50" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Figura 13.2: O "Annulus Natural" do Limbo vs Segmentos ICRS</text><text x="500" y="80" fill="#cfd8dc" font-family="Arial" font-size="16" text-anchor="middle">Comparativo de Contenção Base para Diferentes Arcos de Anel</text><circle cx="250" cy="300" r="120" fill="none" stroke="#cfd8dc" stroke-width="4" stroke-dasharray="10,10"/><circle cx="250" cy="300" r="140" fill="none" stroke="#2c3e50" stroke-width="20"/><text x="250" y="150" fill="#00e5ff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Annulus Natural (Limbo)</text><text x="250" y="480" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Trava 360° todas as famílias de colágeno.</text><circle cx="750" cy="300" r="120" fill="none" stroke="#cfd8dc" stroke-width="4" stroke-dasharray="10,10"/><path d="M 862.763114494309 341.04241719908026 A 120 120 0 1 1 862.763114494309 258.9575828009198" fill="none" stroke="#ffb74d" stroke-width="25"/><text x="750" y="150" fill="#ffb74d" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Annulus Artificial (ICRS Extenso)</text><text x="750" y="480" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Segmentos de alto arco (ex: 320°) imitam a trava circum-limbar.</text></svg>