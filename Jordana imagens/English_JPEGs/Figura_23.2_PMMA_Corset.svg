    <text x="800" y="720" fill="#667788" font-family="Arial, sans-serif" font-size="16" font-style="italic" text-anchor="middle">Three concentric rows of PMMA create a structural corset. VR (blue) = centrifugal. IOP (yellow) intercepted before reaching the apex. Sweet Spot: 70-75%.</text>
